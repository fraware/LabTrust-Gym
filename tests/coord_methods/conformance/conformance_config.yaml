# Conformance suite: skip/xfail per (method_id, contract).
# Remove entry when a method is upgraded to pass that contract.
# Contracts: determinism, legality, safety_invariants, budget, evidence.

# marl_ppo: conformance skipped without model_path (scale_config or env). Optional conformance
# when model_path points to a trained checkpoint (e.g. from labtrust train-ppo). Training
# determinism: same seed yields same policy checkpoints when training code is run with fixed seed.
skip_determinism: [marl_ppo]
skip_legality: [marl_ppo]
skip_safety_invariants: []  # only routing methods are tested; others skip by scope
# Methods that pass budget contract (under tight compute_budget_ms/node_expansions)
pass_budget:
  - centralized_planner
  - llm_central_planner
  - hierarchical_hub_rr
  - hierarchical_hub_local
  - llm_hierarchical_allocator
  - market_auction
  - llm_auction_bidder
  - kernel_auction_edf
  - kernel_auction_whca
  - kernel_centralized_edf
  - kernel_whca
  - kernel_scheduler_or
  - kernel_scheduler_or_whca
  - swarm_reactive
  - swarm_stigmergy_priority
  - gossip_consensus
  - llm_gossip_summarizer
  - consensus_paxos_lite
  - llm_repair_over_kernel_whca
  - llm_local_decider_signed_bus
  - llm_constrained
  - ripple_effect
  - group_evolving_experience_sharing
  - llm_detector_throttle_advisor
# Methods that pass evidence contract (empty = all skip until they emit METHOD_TRACE)
pass_evidence:
  - centralized_planner
  - llm_central_planner
  - hierarchical_hub_rr
  - hierarchical_hub_local
  - llm_hierarchical_allocator
  - market_auction
  - llm_auction_bidder
  - gossip_consensus
  - llm_gossip_summarizer
  - consensus_paxos_lite
  - kernel_centralized_edf
  - llm_repair_over_kernel_whca
  - llm_local_decider_signed_bus
  - llm_constrained
  - ripple_effect
  - group_evolving_experience_sharing
  - swarm_reactive
  - swarm_stigmergy_priority
  - llm_detector_throttle_advisor

xfail_determinism: []
xfail_legality: []
xfail_safety_invariants: []
xfail_budget: []
xfail_evidence: []

# Methods that produce routes (for safety_invariants contract)
routing_method_ids:
  - kernel_whca
  - kernel_auction_whca
  - kernel_auction_whca_shielded
  - llm_repair_over_kernel_whca

# Methods that require optional deps (skip entire conformance if not installed)
# marl_ppo: requires model_path (trained checkpoint). group_evolving_study: study track only.
optional_deps_methods:
  - marl_ppo
  - group_evolving_study
