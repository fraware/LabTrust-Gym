  - invariant_id: "INV-COC-001"
    title: "Chain of custody: every dispatch must have receive or exception with token"
    description: "DISPATCH_TRANSPORT consignment must eventually RECEIVE_TRANSPORT at destination or have CHAIN_OF_CUSTODY_SIGN (dual-approval token) for handoff anomaly."
    severity: "high"
    scope: "system"
