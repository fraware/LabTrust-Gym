# Security attack suite v0.1: golden benchmarks for risk coverage.
#
# Maps risk_registry risks to controls and executable scenarios. Used by
# security_runner to produce SECURITY/attack_results.json and coverage artifacts.
# Entry types (exactly one per attack):
#   scenario_ref: references policy/golden/prompt_injection_scenarios.v0.1.yaml (PI-*).
#   test_ref: optional pytest path for integration tests (e.g. tool sandbox, memory).
#   llm_attacker: true for live LLM-generated adversarial payloads (opt-in).
#   coord_pack_ref: system-level coordination-under-attack; runs full PZ env + coordination
#     pack. Object with optional matrix_preset, or methods_from/injections_from/scales_from.
#     pass_criteria: gate_no_fail (default) | at_least_one_pass. Requires .[env].
# expected_outcome: blocked | detected (attack must be blocked or detected).
# smoke: when true, run in smoke/CI mode for deterministic fast validation.
#
version: "0.1"
controls:
  - control_id: "CTRL-LLM-SHIELD"
    name: "LLM shield and constrained decoding"
    description: "RBAC + schema-constrained action_type; prompt-injection resistance."
  - control_id: "CTRL-RBAC"
    name: "Role-based access control"
    description: "Tool and action gating by role; token enforcement."
  - control_id: "CTRL-TOOL-SANDBOX"
    name: "Tool sandbox and egress limits"
    description: "Byte/record caps, egress allowlist, data classification."
  - control_id: "CTRL-COORD-IDENTITY"
    name: "Signed coordination and replay protection"
    description: "Signed messages, nonce tracking, epoch binding."
  - control_id: "CTRL-MEMORY"
    name: "Memory hardening and poison filtering"
    description: "Authenticated writes, schema, TTL, poison/override filtering on retrieval."
  - control_id: "CTRL-OBSERVABILITY"
    name: "Observability and forensic freeze"
    description: "Episode log, hashchain, invariant trace, receipt export."
  - control_id: "CTRL-DETECTOR-ADVISOR"
    name: "LLM detector throttle advisor"
    description: "Detect + policy-validated containment (TaskH INJ-COMMS-POISON-001)."

