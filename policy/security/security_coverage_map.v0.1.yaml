# Security coverage map v0.1: maps every risk from risk_registry.v0.1.yaml to
# (a) coordination injections (policy/coordination/injections.v0.2.yaml),
# (b) security attack suite cases (policy/golden/security_attack_suite.v0.1.yaml),
# or (c) explicit non-applicable with justification.
# CI test test_security_coverage_gate.py fails when any risk is uncovered or refs are invalid.

version: "0.1"
description: "Every risk must have coverage (covered_by) or be explicitly non_applicable with notes."

entries:
  - risk_id: "R-TOOL-001"
    category: tool
    applies_to: [tools]
    covered_by:
      - type: attack_suite
        ref: "SEC-TOOL-SELECT-001"
    notes: "Tool selection: injected wrong tool_id denied by registry (test_tool_selection_wrong_tool_blocked_by_registry)."

  - risk_id: "R-TOOL-002"
    category: tool
    applies_to: [tools]
    covered_by:
      - type: attack_suite
        ref: "SEC-TOOL-EXECFAIL-001"
    notes: "Tool execution failure: device fault injector and containment (test_tool_execution_failure)."

  - risk_id: "R-TOOL-003"
    category: tool
    applies_to: [tools]
    covered_by:
      - type: attack_suite
        ref: "SEC-TOOL-UNVERIFIED-001"
    notes: "Unverified tool risk; pre-action validation evidenced by test_unregistered_tool_denied (tool not in registry denied)."

  - risk_id: "R-TOOL-004"
    category: tool
    applies_to: [tools]
    covered_by:
      - type: attack_suite
