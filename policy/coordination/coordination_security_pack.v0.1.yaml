# Compound attacks: multiple injectors per cell (defined in risk_injections.COMPOUND_ATTACKS).
# Keys are compound_attack_id; values are lists of injection_ids applied in order.
compound_attacks:
  POISON_THEN_REPLAY:
    - INJ-COMMS-POISON-001
    - INJ-COORD-PLAN-REPLAY-001
  POISON_THEN_COLLUSION:
    - INJ-COMMS-POISON-001
    - INJ-COLLUSION-001
  REPLAY_THEN_SPOOF:
    - INJ-REPLAY-001
    - INJ-ID-SPOOF-001

# Injection list "default" = fixed set; "critical" = short high-signal subset; "policy" = all from injections.v0.2 that exist in INJECTION_REGISTRY (loaded at runtime).
injection_ids:
  default:
    - none
    - INJ-ID-SPOOF-001
    - INJ-COMMS-POISON-001
    - INJ-COORD-PROMPT-INJECT-001
    - INJ-CONSENSUS-POISON-001
    - INJ-TIMING-QUEUE-001
    - INJ-COORD-PLAN-REPLAY-001
    - INJ-COORD-BID-SHILL-001
    - INJ-SLOW-POISON-001
    - INJ-REPLAY-001
    - INJ-DOS-PLANNER-001
    - INJ-MEMORY-POISON-001
    - INJ-BLAME-SHIFT-001
    - INJ-LLM-TOOL-ESCALATION-001
  critical:
    - none
    - INJ-ID-SPOOF-001
    - INJ-COMMS-POISON-001
    - INJ-COORD-PROMPT-INJECT-001
    - INJ-COORD-PLAN-REPLAY-001
