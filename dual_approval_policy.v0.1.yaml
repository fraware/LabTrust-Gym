dual_approval_policy:
  version: "0.1"
  intent: "Prevent single-agent unilateral override of safety/validity gates."
  rules:
    - id: "DA-001"
      applies_to_token_types: ["OVERRIDE_RISK_ACCEPTANCE", "TOKEN_EMERGENCY_ACCESS"]
      requirements:
        - "approvals.count == 2"
        - "approvals[0].approver_agent_id != approvals[1].approver_agent_id"
        - "approvals[0].approver_key_id != approvals[1].approver_key_id"
        - "approvals roles must match token.approver_roles set"
      enforcement: ["DENY_MINT_TOKEN"]
    - id: "DA-002"
      description: "Second approver cannot be the requesting agent."
      requirement: "requesting_agent_id not in approvals[].approver_agent_id"
      enforcement: ["DENY_MINT_TOKEN"]
  risk_record:
    # Required structured record (hashed) for OVERRIDE_RISK_ACCEPTANCE
    fields_required:
      - reason_code
      - clinical_context_class          # inpatient/outpatient/GP/unknown
      - risk_statement                 # template-based, normalized
      - mitigation_steps               # e.g., repeat sample, add comment, urgent recollect
      - timebox                         # how long this acceptance is valid
      - downstream_constraints          # e.g., must_hold_result_for_review=true
