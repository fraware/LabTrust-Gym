# Key registry v0.1: Ed25519 public keys for signed actions.
# key_id, public_key (base64), agent_id, role_id, status, validity window.
# Used when strict_signatures enabled; verification results in step output + receipts.

key_registry:
  version: "0.1"
  keys:
    # Test key (RFC 8032 test vector 1) for golden / unit tests.
