# Minimal spec for LLM coordination methods smoke: 4 methods, 1 scale, 1 injection, 1 episode.
# Used with --llm-backend=deterministic to run 1 cell per LLM method.
study_id: "coordination_llm_smoke"
version: "0.1"
seed_base: 9999
episodes_per_cell: 1

scales:
  - name: num_agents
    values: [2]
  - name: num_sites
    values: [1]
  - name: num_devices
    values: [2]
  - name: arrival_rate
    values: [1.0]
  - name: horizon_steps
    values: [30]

methods:
  - llm_central_planner
  - llm_hierarchical_allocator
  - llm_auction_bidder
  - llm_gossip_summarizer
  - llm_local_decider_signed_bus
  - llm_repair_over_kernel_whca

risks:
  - R-LLM-SMOKE

injections:
  - injection_id: INJ-COMMS-POISON-001
    intensity: 0.1
    seed_offset: 0
