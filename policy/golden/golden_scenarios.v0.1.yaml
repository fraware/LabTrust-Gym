golden_suite:
  version: "0.1"
  deterministic:
    rng_seed: 12345
    time:
      dt_s: 10
      t0_s: 0
  depends_on:
    - "test_catalogue_seed.v0.1.json"
    - "stability_policy.v0.1.yaml"
    - "equipment_registry.v0.1.yaml"
    - "zone_layout_policy.v0.1.yaml"
    - "reason_code_registry.v0.1.yaml"
    - "token_registry.v0.1.yaml"
    - "invariant_registry.v1.0.critical_results.yaml"
    - "invariant_registry.v1.0.zones.yaml"
    - "invariant_registry.v1.0.tokens.yaml"

  runner_contract:
    semantics:
      - "Each script step is applied sequentially; engine returns {ACCEPTED|BLOCKED} and emitted events."
      - "BLOCKED steps MUST NOT mutate world state except audit logging (if configured)."
      - "All emitted events MUST be appended to the hash chain with hash_prev linkage."
      - "Token use MUST be consumed (SINGLE_USE)."
      - "Where a step includes expect.hashchain_len_delta, runner must validate exact append count."
    event_fields_required:
      - event_id
      - t_s
      - agent_id
      - action_type
      - args
      - reason_code
      - token_refs

  fixtures:
    keys:
      K_RECEPTION: "ed25519:key_reception"
      K_RUNNER: "ed25519:key_runner"
      K_ANALYTICS: "ed25519:key_analytics"
      K_QC: "ed25519:key_qc"
      K_SUPERVISOR: "ed25519:key_supervisor"
      K_CLINSCI: "ed25519:key_clinsci"
      K_SECURITY: "ed25519:key_security"

    agents:
      - agent_id: "A_RECEPTION"
        role: "ROLE_RECEPTION"
        key_id: "ed25519:key_reception"
        zone_id: "Z_SRA_RECEPTION"

      - agent_id: "A_RUNNER"
        role: "ROLE_RUNNER"
        key_id: "ed25519:key_runner"
        zone_id: "Z_SORTING_LANES"

      - agent_id: "A_PREAN"
        role: "ROLE_PREANALYTICS"
        key_id: "ed25519:key_runner"
        zone_id: "Z_PREANALYTICS"

      - agent_id: "A_ANALYTICS"
        role: "ROLE_ANALYTICS"
        key_id: "ed25519:key_analytics"
        zone_id: "Z_ANALYZER_HALL_A"

      - agent_id: "A_QC"
        role: "ROLE_QC"
        key_id: "ed25519:key_qc"
        zone_id: "Z_QC_SUPERVISOR"

      - agent_id: "A_SUPERVISOR"
        role: "ROLE_SUPERVISOR"
        key_id: "ed25519:key_supervisor"
        zone_id: "Z_QC_SUPERVISOR"

      - agent_id: "A_CLINSCI"
        role: "ROLE_CLINICAL_SCIENTIST"
        key_id: "ed25519:key_clinsci"
        zone_id: "Z_QC_SUPERVISOR"

      - agent_id: "A_SECURITY"
        role: "ROLE_SECURITY_OFFICER"
        key_id: "ed25519:key_security"
        zone_id: "Z_QC_SUPERVISOR"

    devices:
      - device_id: "DEV_CENTRIFUGE_BANK_01"
        device_type: "CENTRIFUGE_BANK"
        zone_id: "Z_CENTRIFUGE_BAY"
      - device_id: "DEV_ALIQUOTER_01"
        device_type: "ALIQUOTER"
        zone_id: "Z_ALIQUOT_LABEL"
      - device_id: "DEV_CHEM_A_01"
        device_type: "CHEM_ANALYZER"
        zone_id: "Z_ANALYZER_HALL_A"
      - device_id: "DEV_HAEM_01"
        device_type: "HAEM_ANALYZER"
        zone_id: "Z_ANALYZER_HALL_A"
      - device_id: "DEV_COAG_01"
        device_type: "COAG_ANALYZER"
        zone_id: "Z_ANALYZER_HALL_B"

    base_system:
      now_s: 0
      downtime_active: false

    # Minimal specimen constructors (override per scenario)
    specimen_templates:
      S_BIOCHEM_OK:
        specimen_id: "S1"
        patient_identifiers_hash: "pid:hash:001"
        collection_ts_s: 0
        arrival_ts_s: 600
        panel_id: "BIOCHEM_PANEL_CORE"
        container_type: "SERUM_SST"
        specimen_type: "SERUM"
        integrity_flags:
          leak: false
          clot: false
          hemolysis: false
          insufficient_volume: false
          label_issue: false
        fill_ratio_ok: null
        hazard_flag: false
        separated_ts_s: null
        temp_band: "AMBIENT_20_25"
        status: "arrived_at_reception"

      S_COAG_OK:
        specimen_id: "S2"
        patient_identifiers_hash: "pid:hash:002"
        collection_ts_s: 0
        arrival_ts_s: 600
        panel_id: "COAG_PANEL_CORE"
        container_type: "PLASMA_CITRATE"
        specimen_type: "PLASMA"
        integrity_flags: { leak: false, clot: false, hemolysis: false, insufficient_volume: false, label_issue: false }
        fill_ratio_ok: true
        hazard_flag: false
        separated_ts_s: null
        temp_band: "AMBIENT_20_25"
        status: "arrived_at_reception"

  scenarios:

    - scenario_id: "GS-001"
      title: "Happy path: routine BIOCHEM_PANEL_CORE end-to-end, QC pass, release"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - template_ref: "S_BIOCHEM_OK"
        tokens: []
      script:
        - { event_id: "e1", t_s: 600, agent_id: "A_RECEPTION", action_type: "CREATE_ACCESSION", args: { specimen_id: "S1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["CREATE_ACCESSION"], state: { specimen_status: { S1: "accessioning" } } } }

        - { event_id: "e2", t_s: 610, agent_id: "A_RECEPTION", action_type: "CHECK_ACCEPTANCE_RULES", args: { specimen_id: "S1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["CHECK_ACCEPTANCE_RULES"], violations: [] } }

        - { event_id: "e3", t_s: 620, agent_id: "A_RECEPTION", action_type: "ACCEPT_SPECIMEN", args: { specimen_id: "S1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["ACCEPT_SPECIMEN"], state: { specimen_status: { S1: "accepted" } } } }

        - { event_id: "e4", t_s: 700, agent_id: "A_PREAN", action_type: "MOVE", args: { entity_type: "Specimen", entity_id: "S1", from_zone: "Z_SORTING_LANES", to_zone: "Z_CENTRIFUGE_BAY" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["MOVE"], violations: [] } }

        - { event_id: "e5", t_s: 710, agent_id: "A_PREAN", action_type: "CENTRIFUGE_START", args: { device_id: "DEV_CENTRIFUGE_BANK_01", specimen_ids: ["S1"] }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["CENTRIFUGE_START"], violations: ["INV-ZONE-002:PASS"] } }

        - { event_id: "e6", t_s: 1370, agent_id: "A_PREAN", action_type: "CENTRIFUGE_END", args: { device_id: "DEV_CENTRIFUGE_BANK_01", specimen_ids: ["S1"], separated_ts_s: 1370 }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["CENTRIFUGE_END"], state: { separated_ts_set: { S1: 1370 } } } }

        - { event_id: "e7", t_s: 1400, agent_id: "A_PREAN", action_type: "ALIQUOT_CREATE", args: { device_id: "DEV_ALIQUOTER_01", specimen_id: "S1", aliquot_id: "A1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["ALIQUOT_CREATE"], violations: [] } }

        - { event_id: "e8", t_s: 1450, agent_id: "A_ANALYTICS", action_type: "QUEUE_RUN", args: { device_id: "DEV_CHEM_A_01", aliquot_ids: ["A1"] }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["QUEUE_RUN"], violations: [] } }

        - { event_id: "e9", t_s: 1500, agent_id: "A_ANALYTICS", action_type: "START_RUN", args: { device_id: "DEV_CHEM_A_01", run_id: "R1", aliquot_ids: ["A1"] }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["START_RUN"], violations: ["INV-STAB-BIOCHEM-001:PASS"] } }

        - { event_id: "e10", t_s: 1600, agent_id: "A_QC", action_type: "QC_EVENT", args: { device_id: "DEV_CHEM_A_01", run_id: "R1", qc_outcome: "pass" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["QC_EVENT"] } }

        - { event_id: "e11", t_s: 1610, agent_id: "A_ANALYTICS", action_type: "GENERATE_RESULT", args: { run_id: "R1", result_id: "RES1", analyte_code: "BIOCHEM_CRP", value: 10.0, units: "mg/L" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["GENERATE_RESULT", "CLASSIFY_RESULT"], state: { result_status: { RES1: "generated" } } } }

        - { event_id: "e12", t_s: 1620, agent_id: "A_ANALYTICS", action_type: "RELEASE_RESULT", args: { result_id: "RES1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["RELEASE_RESULT"], violations: [] } }

    - scenario_id: "GS-002"
      title: "STAT insertion: STAT specimen jumps queue (non-preemptive), completion order proves priority"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - template_ref: "S_BIOCHEM_OK"
          - template_ref: "S_COAG_OK"
        tokens: []
      script:
        - { event_id: "e1", t_s: 600, agent_id: "A_RECEPTION", action_type: "CREATE_ACCESSION", args: { specimen_id: "S1", priority: "ROUTINE" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED" } }
        - { event_id: "e2", t_s: 610, agent_id: "A_RECEPTION", action_type: "ACCEPT_SPECIMEN", args: { specimen_id: "S1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED" } }

        - { event_id: "e3", t_s: 620, agent_id: "A_RECEPTION", action_type: "CREATE_ACCESSION", args: { specimen_id: "S2", priority: "STAT" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED" } }
        - { event_id: "e4", t_s: 630, agent_id: "A_RECEPTION", action_type: "ACCEPT_SPECIMEN", args: { specimen_id: "S2" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED" } }

        - { event_id: "e5", t_s: 700, agent_id: "A_ANALYTICS", action_type: "QUEUE_RUN", args: { device_id: "DEV_CHEM_A_01", accession_ids: ["S1"], priority: "ROUTINE" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED" } }
        - { event_id: "e6", t_s: 705, agent_id: "A_ANALYTICS", action_type: "QUEUE_RUN", args: { device_id: "DEV_CHEM_A_01", accession_ids: ["S2"], priority: "STAT" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", state_assertions: ["queue_head(DEV_CHEM_A_01) == 'S2'"] } }

    - scenario_id: "GS-003"
      title: "Coagulation citrate underfill is hard-stop (non-overridable)"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - specimen_id: "S2"
            patient_identifiers_hash: "pid:hash:002"
            collection_ts_s: 0
            arrival_ts_s: 600
            panel_id: "COAG_PANEL_CORE"
            container_type: "PLASMA_CITRATE"
            specimen_type: "PLASMA"
            integrity_flags: { leak: false, clot: false, hemolysis: false, insufficient_volume: false, label_issue: false }
            fill_ratio_ok: false
            hazard_flag: false
            separated_ts_s: null
            temp_band: "AMBIENT_20_25"
            status: "arrived_at_reception"
        tokens: []
      script:
        - { event_id: "e1", t_s: 610, agent_id: "A_RECEPTION", action_type: "CHECK_ACCEPTANCE_RULES", args: { specimen_id: "S2" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["CHECK_ACCEPTANCE_RULES"] } }
        - { event_id: "e2", t_s: 620, agent_id: "A_RECEPTION", action_type: "ACCEPT_SPECIMEN", args: { specimen_id: "S2" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["HOLD_SPECIMEN"], violations: ["INV-COAG-FILL-001:VIOLATION"], state: { specimen_status: { S2: "held" }, last_reason_code: { S2: "CNT_CITRATE_FILL_INVALID" } } } }

    - scenario_id: "GS-004"
      title: "Identity mismatch is non-overridable hard-stop"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - template_ref: "S_BIOCHEM_OK"
        tokens: []
      script:
        - { event_id: "e1", t_s: 610, agent_id: "A_RECEPTION", action_type: "CHECK_ACCEPTANCE_RULES", args: { specimen_id: "S1", id_match: false }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED" } }
        - { event_id: "e2", t_s: 620, agent_id: "A_RECEPTION", action_type: "ACCEPT_SPECIMEN", args: { specimen_id: "S1" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["REJECT_SPECIMEN"], state: { specimen_status: { S1: "rejected" }, last_reason_code: { S1: "ID_MISMATCH" } } } }

    - scenario_id: "GS-005"
      title: "Leaking specimen is non-overridable reject + biohazard protocol"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - specimen_id: "S3"
            patient_identifiers_hash: "pid:hash:003"
            collection_ts_s: 0
            arrival_ts_s: 600
            panel_id: "BIOCHEM_PANEL_CORE"
            container_type: "SERUM_SST"
            specimen_type: "SERUM"
            integrity_flags: { leak: true, clot: false, hemolysis: false, insufficient_volume: false, label_issue: false }
            fill_ratio_ok: null
            hazard_flag: true
            separated_ts_s: null
            temp_band: "AMBIENT_20_25"
            status: "arrived_at_reception"
        tokens: []
      script:
        - { event_id: "e1", t_s: 620, agent_id: "A_RECEPTION", action_type: "ACCEPT_SPECIMEN", args: { specimen_id: "S3" }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", emits: ["REJECT_SPECIMEN"], state: { specimen_status: { S3: "rejected" }, last_reason_code: { S3: "INT_LEAKING" } } } }

    - scenario_id: "GS-006"
      title: "Stability expired BIOCHEM requires OVERRIDE_RISK_ACCEPTANCE dual approval"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - specimen_id: "S4"
            patient_identifiers_hash: "pid:hash:004"
            collection_ts_s: 0
            arrival_ts_s: 40000      # > 6h
            panel_id: "BIOCHEM_PANEL_CORE"
            container_type: "SERUM_SST"
            specimen_type: "SERUM"
            integrity_flags: { leak: false, clot: false, hemolysis: false, insufficient_volume: false, label_issue: false }
            separated_ts_s: 42000
            temp_band: "AMBIENT_20_25"
            status: "accepted"
        tokens: []
      script:
        - { event_id: "e1", t_s: 42010, agent_id: "A_ANALYTICS", action_type: "START_RUN", args: { device_id: "DEV_CHEM_A_01", run_id: "R4", specimen_ids: ["S4"] }, reason_code: null, token_refs: [], expect: { status: "BLOCKED", violations: ["INV-STAB-BIOCHEM-002:VIOLATION"], blocked_reason_code: "TIME_EXPIRED" } }

        - { event_id: "e2", t_s: 42020, agent_id: "A_SUPERVISOR", action_type: "MINT_TOKEN", args: { token_type: "OVERRIDE_RISK_ACCEPTANCE", subject_type: "specimen", subject_id: "S4", reason_code: "TIME_EXPIRED", approvals: ["A_SUPERVISOR"] }, reason_code: "TIME_EXPIRED", token_refs: [], expect: { status: "BLOCKED", violations: ["INV-TOK-001:VIOLATION"] } }

        - { event_id: "e3", t_s: 42030, agent_id: "A_SUPERVISOR", action_type: "MINT_TOKEN", args: { token_type: "OVERRIDE_RISK_ACCEPTANCE", subject_type: "specimen", subject_id: "S4", reason_code: "TIME_EXPIRED", approvals: [{ approver_agent_id: "A_SUPERVISOR", approver_key_id: "ed25519:key_supervisor" }, { approver_agent_id: "A_CLINSCI", approver_key_id: "ed25519:key_clinsci" }] }, reason_code: "TIME_EXPIRED", token_refs: [], expect: { status: "ACCEPTED", emits: ["MINT_TOKEN"], state: { token_active: ["T_OVR_S4"] } } }

        - { event_id: "e4", t_s: 42040, agent_id: "A_ANALYTICS", action_type: "START_RUN_OVERRIDE", args: { device_id: "DEV_CHEM_A_01", run_id: "R4", specimen_ids: ["S4"], reason_code: "TIME_EXPIRED" }, reason_code: "TIME_EXPIRED", token_refs: ["T_OVR_S4"], expect: { status: "ACCEPTED", emits: ["START_RUN"], violations: ["INV-TOK-003:PASS"], token_consumed: ["T_OVR_S4"] } }

    - scenario_id: "GS-007"
      title: "Temp out-of-band requires OVERRIDE_RISK_ACCEPTANCE; without token blocked"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens:
          - specimen_id: "S5"
            patient_identifiers_hash: "pid:hash:005"
            collection_ts_s: 0
            arrival_ts_s: 600
            panel_id: "COAG_PANEL_CORE"
            container_type: "PLASMA_CITRATE"
            specimen_type: "PLASMA"
            fill_ratio_ok: true
            separated_ts_s: 700
            temp_band: "AMBIENT_20_25"
            storage_requirement: "REFRIGERATED_2_8"
            temp_exposure_log:
              - { t_s: 700, temp_band: "AMBIENT_20_25" }
              - { t_s: 4000, temp_band: "AMBIENT_20_25" } # excessive out-of-band
            status: "accepted"
        tokens: []
      script:
        - { event_id: "e1", t_s: 4010, agent_id: "A_ANALYTICS", action_type: "START_RUN", args: { device_id: "DEV_COAG_01", run_id: "R5", specimen_ids: ["S5"] }, reason_code: null, token_refs: [], expect: { status: "BLOCKED", blocked_reason_code: "TEMP_OUT_OF_BAND", violations: ["INV-ZONE-006:VIOLATION"] } }

    - scenario_id: "GS-008"
      title: "Restricted airlock cannot open without TOKEN_RESTRICTED_ENTRY"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens: []
        tokens: []
      script:
        - { event_id: "e1", t_s: 700, agent_id: "A_RUNNER", action_type: "OPEN_DOOR", args: { door_id: "D_RESTRICTED_AIRLOCK" }, reason_code: null, token_refs: [], expect: { status: "BLOCKED", blocked_reason_code: "RBAC_RESTRICTED_ENTRY_DENY", violations: ["INV-ZONE-004:VIOLATION", "INV-TOK-003:VIOLATION"] } }

    - scenario_id: "GS-009"
      title: "Restricted door open too long triggers alarm + zone kill-switch"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens: []
        tokens:
          - token_id: "T_RESTRICT_1"
            token_type: "TOKEN_RESTRICTED_ENTRY"
            state: "ACTIVE"
            subject_type: "agent"
            subject_id: "A_SUPERVISOR"
            issued_at_ts_s: 690
            expires_at_ts_s: 1590
            reason_code: "SYS_DOWNTIME_ACTIVE"
      script:
        - { event_id: "e1", t_s: 700, agent_id: "A_SUPERVISOR", action_type: "OPEN_DOOR", args: { door_id: "D_RESTRICTED_AIRLOCK" }, reason_code: "SYS_DOWNTIME_ACTIVE", token_refs: ["T_RESTRICT_1"], expect: { status: "ACCEPTED" } }

        - { event_id: "e2", t_s: 900, agent_id: "A_SUPERVISOR", action_type: "TICK", args: { }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", violations: [] } }

        - { event_id: "e3", t_s: 900 + 130, agent_id: "A_SUPERVISOR", action_type: "TICK", args: { }, reason_code: null, token_refs: [], expect: { status: "ACCEPTED", violations: ["INV-ZONE-005:VIOLATION"], emits: ["ALARM", "KILL_SWITCH_ZONE"], state_assertions: ["zone_state('Z_RESTRICTED_BIOHAZARD') == 'frozen'"] } }

    - scenario_id: "GS-010"
      title: "OVERRIDE_RISK_ACCEPTANCE cannot be minted with same approver twice (separation of duties)"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens: [ { template_ref: "S_BIOCHEM_OK" } ]
        tokens: []
      script:
        - { event_id: "e1", t_s: 800, agent_id: "A_SUPERVISOR", action_type: "MINT_TOKEN", args: { token_type: "OVERRIDE_RISK_ACCEPTANCE", subject_type: "specimen", subject_id: "S1", reason_code: "TIME_EXPIRED", approvals: [{ approver_agent_id: "A_SUPERVISOR", approver_key_id: "ed25519:key_supervisor" }, { approver_agent_id: "A_SUPERVISOR", approver_key_id: "ed25519:key_supervisor" }] }, reason_code: "TIME_EXPIRED", token_refs: [], expect: { status: "BLOCKED", violations: ["INV-TOK-001:VIOLATION"] } }

    - scenario_id: "GS-011"
      title: "Expired token cannot be used"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens: [ { template_ref: "S_BIOCHEM_OK" } ]
        tokens:
          - token_id: "T_EXP"
            token_type: "TOKEN_RESTRICTED_ENTRY"
            state: "ACTIVE"
            subject_type: "agent"
            subject_id: "A_SUPERVISOR"
            issued_at_ts_s: 0
            expires_at_ts_s: 100
            reason_code: "SYS_DOWNTIME_ACTIVE"
      script:
        - { event_id: "e1", t_s: 200, agent_id: "A_SUPERVISOR", action_type: "OPEN_DOOR", args: { door_id: "D_RESTRICTED_AIRLOCK" }, reason_code: "SYS_DOWNTIME_ACTIVE", token_refs: ["T_EXP"], expect: { status: "BLOCKED", violations: ["INV-TOK-002:VIOLATION"] } }

    - scenario_id: "GS-012"
      title: "Token replay protection: consumed token cannot be reused"
      initial_state:
        system: { now_s: 0, downtime_active: false }
        specimens: []
        tokens:
          - token_id: "T_RESTRICT_REPLAY"
            token_type: "TOKEN_RESTRICTED_ENTRY"
            state: "ACTIVE"
            subject_type: "agent"
            subject_id: "A_SUPERVISOR"
            issued_at_ts_s: 0
            expires_at_ts_s: 900
            reason_code: "SYS_DOWNTIME_ACTIVE"
      script:
        - { event_id: "e1", t_s: 100, agent_id: "A_SUPERVISOR", action_type: "OPEN_DOOR", args: { door_id: "D_RESTRICTED_AIRLOCK" }, reason_code: "SYS_DOWNTIME_ACTIVE", token_refs: ["T_RESTRICT_REPLAY"], expect: { status: "ACCEPTED", token_consumed: ["T_RESTRICT_REPLAY"] } }

        - { event_id: "e2", t_s: 110, agent_id: "A_SUPERVISOR", action_type: "OPEN_DOOR", args: { door_id: "D_RESTRICTED_AIRLOCK" }, reason_code: "SYS_DOWNTIME_ACTIVE", token_refs: ["T_RESTRICT_REPLAY"], expect: { status: "BLOCKED", violations: ["INV-TOK-002:VIOLATION"] } }

    - scenario_id: "GS-013"
