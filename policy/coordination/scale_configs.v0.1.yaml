# Scale configs for coordination benchmarks (TaskG/TaskH).
# corridor_heavy: many agents, bottleneck zones for routing stress.

scale_configs:
  version: "0.1"
  configs:
    - id: "corridor_heavy"
      name: "Corridor-heavy (high contention)"
      description: "200 agents, 2 sites, narrow corridor zones to stress WHCA* router."
      num_agents_total: 200
      role_mix:
        ROLE_RUNNER: 0.5
        ROLE_ANALYTICS: 0.25
        ROLE_RECEPTION: 0.15
        ROLE_QC: 0.05
        ROLE_SUPERVISOR: 0.05
      num_devices_per_type:
        CHEM_ANALYZER: 4
        CENTRIFUGE_BANK: 2
      num_sites: 2
      specimens_per_min: 5.0
      horizon_steps: 150
      timing_mode: "explicit"

    - id: "small_smoke"
      name: "Small smoke (fast unit test)"
      num_agents_total: 4
      role_mix:
        ROLE_RUNNER: 0.5
        ROLE_ANALYTICS: 0.3
        ROLE_RECEPTION: 0.2
      num_devices_per_type:
        CHEM_ANALYZER: 2
        CENTRIFUGE_BANK: 1
      num_sites: 1
      specimens_per_min: 1.0
      horizon_steps: 50
      timing_mode: "explicit"
      coord_auction_protocol: "round_robin"

    - id: "small_8"
      name: "Small 8-agent (deterministic variant)"
      description: "8 agents for slightly larger smoke/regression than small_smoke."
      num_agents_total: 8
      role_mix:
        ROLE_RUNNER: 0.5
        ROLE_ANALYTICS: 0.3
        ROLE_RECEPTION: 0.2
      num_devices_per_type:
        CHEM_ANALYZER: 2
        CENTRIFUGE_BANK: 1
      num_sites: 1
      specimens_per_min: 1.5
      horizon_steps: 60
      timing_mode: "explicit"

    - id: "medium_stress_signed_bus"
      name: "Medium stress (signed bus / identity)"
      description: "50-100 agents, 8-12 devices, 2 sites; arrival rate tuned so queues form without saturation. For signed message bus and coordination identity evaluation."
      num_agents_total: 75
      role_mix:
        ROLE_RUNNER: 0.5
        ROLE_ANALYTICS: 0.25
        ROLE_RECEPTION: 0.15
        ROLE_QC: 0.05
        ROLE_SUPERVISOR: 0.05
      num_devices_per_type:
        CHEM_ANALYZER: 6
        CENTRIFUGE_BANK: 3
        ALIQUOTER: 1
      num_sites: 2
      specimens_per_min: 3.5
      horizon_steps: 300
      timing_mode: "simulated"
