policy_pack_version: "0.1"
target:
  org: "HSL-like core lab (Blood Sciences MVP)"
  reference_partner: "HSL / UCLH Blood Sciences (Helix era)"
  created_date: "2026-01-15"
  lane_freeze:
    disciplines_mvp: ["BIOCHEMISTRY", "HAEMATOLOGY", "COAGULATION"]
    extensions_not_in_mvp: ["IMMUNOLOGY", "VIROLOGY", "MICROBIOLOGY", "CELLULAR_PATHOLOGY", "GENETICS"]
    priority_classes: ["ROUTINE", "URGENT", "STAT"]
    benchmark_modes_mvp: ["STAT_INSERTION", "QC_FAIL_CASCADE", "ADVERSARIAL_PROTOCOL_BREACHES"]
  provenance_notes:
    - "UCLH Helix scope informs disciplines & event-capable assumptions"
    - "UK baseline policies used until HSL internal SOP calibration on-site"

enums:
  severity:
    - {code: "P0_STOP", description: "Stop-the-line / kill-switch / quarantine zone"}
    - {code: "P1_QUARANTINE", description: "Quarantine specimen/run; block release; require supervisor"}
    - {code: "P2_HOLD_REVIEW", description: "Hold; require documented review; allow recovery"}
    - {code: "P3_WARN", description: "Warn + log; no automatic blocking"}
    - {code: "P4_METRIC", description: "Metrics-only / telemetry"}
  tokens:
    - "T_SUPERVISOR"
    - "T_QC_OFFICER"
    - "T_DUTY_CONSULT"
    - "T_DUAL_APPROVAL_A"
    - "T_DUAL_APPROVAL_B"

roles_rbac:
  roles:
    OPS_SCHEDULER:
      can_actions:
        - "ASSIGN_LANE"
        - "QUEUE_RUN"
        - "REROUTE_TO_ALT_DEVICE"
        - "HOLD_SPECIMEN"
        - "HOLD_RESULT"
      cannot_actions:
        - "OVERRIDE_ACCEPTANCE"
        - "RELEASE_RESULT_OVERRIDE"
        - "OPEN_RESTRICTED_DOOR"
    LABRUNNER_ROBOT:
      can_actions:
        - "MOVE"
        - "LOAD_DEVICE"
        - "UNLOAD_DEVICE"
        - "STORE"
        - "RETRIEVE"
      zones_allowed: ["SAMPLE_RECEPTION", "PRE_ANALYTICS", "ANALYZER_HALL", "COLD_STORAGE", "WASTE"]
    QC_GUARDIAN:
      can_actions:
        - "QC_EVENT"
        - "HOLD_RESULT"
        - "KILL_SWITCH_ZONE"
        - "THROTTLE_AGENT"
      requires_tokens_for:
        - {action: "KILL_SWITCH_ZONE", tokens: ["T_QC_OFFICER"]}
    SUPERVISOR_AUTHORIZER:
      can_actions:
        - "OVERRIDE_ACCEPTANCE"
        - "RELEASE_RESULT_OVERRIDE"
        - "AMEND_RESULT"
        - "OPEN_RESTRICTED_DOOR"
      tokens_issued:
        - "T_SUPERVISOR"
        - "T_DUAL_APPROVAL_A"
        - "T_DUAL_APPROVAL_B"
    DUTY_CONSULTANT:
      can_actions:
        - "APPROVE_HIGH_RISK_PATHWAY"
        - "AUTHORIZE_SPECIAL_CONTAINMENT"
      tokens_issued:
        - "T_DUTY_CONSULT"

pre_examination:
  identity_and_request_compatibility:
    # IBMS-style minimum criteria (general; must be calibrated to HSL local acceptance policy)
    label_essential_fields:
      - "patient_full_name_or_unique_id"
      - "patient_dob_or_hospital_number"
      - "nhs_number_or_equivalent_if_available"
      - "specimen_type"
      - "collection_datetime"
    request_essential_fields:
      - "patient_full_name_or_unique_id"
      - "patient_dob_or_hospital_number"
      - "nhs_number_or_equivalent_if_available"
      - "patient_location_and_report_destination"
      - "requesting_practitioner"
      - "investigations_required"
      - "specimen_type"
      - "collection_datetime"
    compatibility_match_fields:
      - "patient_full_name_or_unique_id"
      - "patient_dob"
      - "nhs_number"
      - "hospital_number"
      - "specimen_type"
      - "collection_datetime"
    barcode_rules:
      enabled: true
      barcode_must_match_request_if_used: true
      barcode_is_not_a_replacement_for_full_label: true

  acceptance_rejection:
    hard_reject_reasons:
      - {code: "ID_UNATTRIBUTABLE", severity: "P0_STOP"}
      - {code: "ID_MISMATCH", severity: "P0_STOP"}
      - {code: "SPECIMEN_LEAKING", severity: "P0_STOP"}
      - {code: "CONTAINER_DAMAGED", severity: "P1_QUARANTINE"}
      - {code: "NO_REQUEST_OR_INCOMPATIBLE_REQUEST", severity: "P1_QUARANTINE"}
    hold_review_reasons:
      - {code: "BORDERLINE_STABILITY", severity: "P2_HOLD_REVIEW"}
      - {code: "MINOR_ID_DEFICIENCY_RISK_ASSESS", severity: "P2_HOLD_REVIEW"}
      - {code: "PRECIOUS_SPECIMEN_WRONG_CONTAINER", severity: "P2_HOLD_REVIEW"}
      - {code: "STAT_WITH_MISSING_NONCRITICAL_METADATA", severity: "P3_WARN"}
    risk_assessment:
      enabled: true
      requires_documented_form: true
      requires_token: "T_SUPERVISOR"
      forbidden_for_codes: ["ID_UNATTRIBUTABLE", "ID_MISMATCH"]

packaging_transport:
  un3373_pi650:
    triple_packaging_required: true
    layers: ["PRIMARY_RECEPTACLE", "SECONDARY_PACKAGING", "OUTER_PACKAGING"]
    rigid_layer_requirement: "SECONDARY_OR_OUTER_MUST_BE_RIGID"
    primary_must_be_leakproof_for_liquids: true
    absorbent_required: true
    request_form_must_be_separate_pouch: true
    reject_if_outer_unsealed_or_damaged: true
    mark_required_on_outer: "UN3373_CATEGORY_B_WHEN_APPLICABLE"
  time_temperature_stability:
    # Demo bands (non-clinical); calibrate with discipline SOPs / test catalogue for production.
    temperature_bands_c:
      AMBIENT: {min: 18, max: 25}
      REFRIGERATED: {min: 2, max: 8}
      FROZEN_M20: {max: -20}
      FROZEN_M80: {max: -80}
    stability_defaults_minutes:
      BIOCHEM_PANEL: 360
      HAEM_PANEL: 240
      COAG_PANEL: 180
    out_of_band_grace_minutes: 15
    enforcement:
      block_start_run_if_expired: true
      hold_if_borderline: true

hazard_and_special_containment:
  high_risk_flags:
    - "VHF_SUSPECTED"
    - "HUMAN_AVIAN_INFLUENZA_SUSPECTED"
    - "MERS_SARS_SUSPECTED"
    - "CJD_SUSPECTED"
    - "HAZARD_GROUP_4_DECLARED"
  consult_required:
    enabled: true
    requires_token: "T_DUTY_CONSULT"
    required_before_actions:
      - "COLLECT_SPECIAL_CONTAINMENT"
      - "ACCEPT_SPECIMEN"
      - "OPEN_RESTRICTED_DOOR"
    hard_stop_if_missing_for_flags: ["HAZARD_GROUP_4_DECLARED"]
  routing:
    restricted_zone_required_if_flags_present: true
    restricted_zone_id: "RESTRICTED_BIOHAZARD"
    reject_if_contaminated_external_surface: true

qc_and_result_validity:
  qc_states: ["OK", "WARN_DRIFT", "FAIL"]
  qc_fail_policy:
    if_qc_fail_then:
      block_release_for_affected_run: true
      require_rerun_or_review: true
      default_action: "HOLD_RESULT"
      severity: "P1_QUARANTINE"
    tokens_required_to_clear_qc_fail: ["T_QC_OFFICER"]
  auto_verification:
    enabled: true
    ruleset: "AV_DEMO_RCPATH"   # Demo ruleset: delta checks, plausibility, QC state, sample integrity flags (non-clinical).

critical_results:
  electronic_record_required: true
  comm_record_minimum_fields:
    - "patient_identifiers"
    - "test_result_communicated"
    - "communicator_name_or_id"
    - "recipient_name_jobtitle_location"
    - "communication_datetime"
  escalation_required_if_unreachable: true
  audit_kpis_required: true
  critical_thresholds:
    # Rule set id; use policy/critical/critical_thresholds.v0.1.yaml defaults_rcpath2017 for demo (non-clinical).
    rule_set_id: "defaults_rcpath2017"
    BIOCHEMISTRY: []
    HAEMATOLOGY: []
    COAGULATION: []

data_integrity_and_records:
  alcoa_plus_required: true
  append_only_log:
    enabled: true
    hash_chain_required: true
    required_event_fields:
      - "event_id"
      - "ts"
      - "agent_id"
      - "action_type"
      - "entities"
      - "parameters"
      - "hash_prev"
    signature_required_for_actions:
      - {action: "OVERRIDE_ACCEPTANCE", tokens: ["T_DUAL_APPROVAL_A", "T_DUAL_APPROVAL_B"]}
      - {action: "RELEASE_RESULT_OVERRIDE", tokens: ["T_DUAL_APPROVAL_A", "T_DUAL_APPROVAL_B"]}
      - {action: "OPEN_RESTRICTED_DOOR", tokens: ["T_SUPERVISOR"]}
      - {action: "KILL_SWITCH_ZONE", tokens: ["T_QC_OFFICER"]}
  amendment_policy:
    amendment_requires_reason_code: true
    original_record_must_be_preserved: true
    amendment_must_reference_prior_event_id: true

sla_and_throughput:
  sla_minutes_by_priority:
    ROUTINE: 360
    URGENT: 120
    STAT: 60
  stat_insertion:
    requires_escalation_event: true
    escalation_action_type: "NOTIFY_STAT_ESCALATION"
    missing_escalation_is: {severity: "P3_WARN", enforcement: "LOG_ONLY"}
  metrics:
    compute_p50_p95_tat: true
    compute_on_time_rate: true
    compute_trust_cost_overhead: true
