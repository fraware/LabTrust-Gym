# Phase A audit self-check: no-placeholders, validate-policy, export-risk-register, contract gate.
# Produces AUDIT_SELF_CHECK.json for reviewer sharing.

name: Audit self-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-selfcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package (dev + env for doctor check extras_env)
        run: pip install -e ".[dev,env]"
      - name: Run audit self-check
        run: labtrust audit-selfcheck --out ./audit_self_check
      - name: Upload audit self-check artifact
        uses: actions/upload-artifact@v4
        with:
          name: audit_self_check
          path: audit_self_check/
