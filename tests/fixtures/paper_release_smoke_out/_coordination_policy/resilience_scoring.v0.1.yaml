# Resilience scoring policy v0.1: decomposed robustness model for coordination studies.
# resilience_score = weighted sum of component scores (perf, safety, security, coordination).
# Each component is [0, 1]; weights sum to 1. Missing metrics use missing_metric_behavior.

version: "0.1"
policy_id: "resilience_scoring_v0.1"

# Component weights (must sum to 1.0). Changing weights changes scores deterministically.
weights:
  perf: 0.25
  safety: 0.25
  security: 0.25
  coordination: 0.25

# When a metric is absent: "zero" => treat as 0, "one" => treat as 1, "omit" => exclude from component (component = mean of present sub-metrics, or 0.5 if none).
missing_metric_behavior: "omit"

# Per-component sub-metrics: normalization range [min, max], direction, saturation.
# direction: "higher_better" | "lower_better". Score = linear map into [0, 1] then clamp.
components:
  perf:
    description: "Normalized throughput and p95 TAT"
    sub_metrics:
      throughput:
        cell_key: "perf.throughput"
        direction: "higher_better"
        range: [0, 50]
        saturation: [0, 1]
      p95_tat:
        cell_key: "perf.p95_tat"
        direction: "lower_better"
        range: [0, 600]
        saturation: [0, 1]

  safety:
    description: "Violations and blocks (distinguish block vs violation)"
    sub_metrics:
      violations_total:
        cell_key: "safety.violations_total"
        direction: "lower_better"
        range: [0, 100]
        saturation: [0, 1]
      blocks_total:
        cell_key: "safety.blocks_total"
        direction: "lower_better"
        range: [0, 50]
        saturation: [0, 1]

  security:
    description: "Attack success, detection latency, containment time"
    sub_metrics:
      attack_success_rate:
        cell_key: "sec.attack_success_rate"
        direction: "lower_better"
        range: [0, 1]
        saturation: [0, 1]
      detection_latency_steps:
        cell_key: "sec.detection_latency_steps"
        direction: "lower_better"
        range: [0, 50]
        saturation: [0, 1]
      containment_time_steps:
        cell_key: "sec.containment_time_steps"
        direction: "lower_better"
        range: [0, 20]
        saturation: [0, 1]

  coordination:
    description: "Comms drop rate, stale action rate, deadlock avoids"
    sub_metrics:
      comm_drop_rate:
        cell_key: "comm.drop_rate"
        direction: "lower_better"
        range: [0, 1]
        saturation: [0, 1]
      stale_action_rate:
        cell_key: "coordination.stale_action_rate"
        direction: "lower_better"
        range: [0, 1]
        saturation: [0, 1]
      deadlock_avoids:
        cell_key: "coordination.deadlock_avoids"
        direction: "higher_better"
        range: [0, 100]
        saturation: [0, 1]
