# Risk coverage registry v0.1: maps every coordination-relevant risk from risk_registry.v0.1.yaml
# to at least one of: (a) coordination injection in policy/coordination/injections.v0.2.yaml,
# (b) security attack suite case in policy/golden/security_attack_suite.v0.1.yaml,
# (c) explicit not_applicable with justification.
# CI test test_risk_coverage_regression.py fails when coverage regresses (new risk without mapping,
# or referenced injection_id/attack_id missing from source files).

risk_coverage_registry:
  version: "0.1"
  description: "Every risk in risk_registry.v0.1.yaml must have exactly one of: injection_ids, attack_ids, or not_applicable_justification."

  coverage:
    - risk_id: "R-TOOL-001"
      not_applicable_justification: "Tool selection errors are single-agent workflow; no coordination injection or security attack suite case. Covered by benchmark/golden flows."

    - risk_id: "R-TOOL-002"
      not_applicable_justification: "Tool execution failure (device/queue) exercised in failure_models and benchmarks; not in coordination injections v0.2 or security attack suite."

    - risk_id: "R-TOOL-003"
      not_applicable_justification: "Unverified tool risk mitigated by shield layer and invariant checks; no dedicated coordination injection or attack suite case."

    - risk_id: "R-TOOL-004"
      not_applicable_justification: "Tool misuse (wrong context) covered by schema validation and golden scenarios; no coordination injection in v0.2."

    - risk_id: "R-TOOL-005"
      not_applicable_justification: "Misparameterization covered by allowlist and test_llm_misparam_rejected; not in coordination injection set."

    - risk_id: "R-FLOW-001"
      not_applicable_justification: "Action inefficiency is performance/benchmark concern; not a coordination or security attack suite target."

    - risk_id: "R-FLOW-002"
      not_applicable_justification: "Action progress (deadlock/livelock) exercised in benchmarks and fallback policies; no coordination injection in v0.2."

    - risk_id: "R-TOOL-006"
      attack_ids: ["SEC-TOOL-001"]

    - risk_id: "R-DATA-001"
      attack_ids: ["SEC-OBS-001"]

    - risk_id: "R-SYS-001"
      not_applicable_justification: "Agent DoS (flood/rate spike) not yet represented in injections.v0.2 or security_attack_suite; rate limits and backpressure are controls."

    - risk_id: "R-SYS-002"
      injection_ids: ["INJ-COLLUSION-001", "INJ-BID-SPOOF-001"]
      attack_ids: ["SEC-COORD-RT-002"]

    - risk_id: "R-COMMS-001"
      injection_ids: ["INJ-ID-SPOOF-001", "INJ-REPLAY-001"]
      attack_ids: ["SEC-COORD-001", "SEC-COORD-RT-001"]

    - risk_id: "R-COMMS-002"
      injection_ids: ["INJ-COMMS-POISON-001"]
      attack_ids: ["SEC-DETECTOR-001"]

    - risk_id: "R-CAP-001"
      attack_ids: ["SEC-PI-001", "SEC-PI-002", "SEC-PI-003", "SEC-PI-004", "SEC-PI-005"]

    - risk_id: "R-DATA-002"
      injection_ids: ["INJ-SLOW-POISON-001"]
      # Runtime slow-roll poisoning maps to data poisoning (train/run-time) risk.

    - risk_id: "R-DATA-003"
      injection_ids: ["INJ-MEMORY-POISON-001"]
      attack_ids: ["SEC-MEM-001"]
