# LLM fault model for llm_offline mode: deterministic injection of failure modes
# to test fallback and metrics. Schema: policy/llm/llm_fault_model.v0.1.schema.json

version: "0.1"
enabled: true
seed_offset: 0  # added to episode seed for fault RNG

# Faults: applied with probability p (seeded) or on step_intervals (step indices).
# When a fault triggers, system falls back to safe NOOP (or deterministic repair path)
# and records the reason_code. First matching rule wins per step.
faults:
  - fault_id: "invalid_output"
    description: "Schema violation (invalid JSON or envelope)."
    probability: 0.1
    reason_code: "RC_LLM_INVALID_OUTPUT"

  - fault_id: "empty_output"
    description: "Empty output / refusal."
    probability: 0.08
    reason_code: "LLM_REFUSED"

  - fault_id: "high_latency"
    description: "Simulated high latency; meta.latency_ms set high."
    probability: 0.05
    reason_code: "RC_LLM_FAULT_INJECTED"
    simulated_latency_ms: 5000.0

  - fault_id: "inconsistent_plan"
    description: "Contradictory assignments (fallback to NOOP)."
    probability: 0.07
    reason_code: "RC_LLM_FAULT_INJECTED"

# Optional: step_intervals override probability for specific steps (deterministic).
# If step_intervals is set, fault triggers only on those steps (and probability
# is ignored for this fault when step is in list).
# step_intervals: [3, 7, 11]
