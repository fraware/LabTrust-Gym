registry_version: "1.0"
generated_from:
  stability_policy_version: "0.1"

invariants:

  - invariant_id: "INV-STAB-BIOCHEM-001"
    title: "Biochem requires separation within 120 minutes"
    trigger: { on_action: ["START_RUN", "ALIQUOT_CREATE", "CENTRIFUGE_END"] }
    logic_template: >
      if specimen.panel == BIOCHEM_PANEL_CORE
      and specimen.separated_ts is null
      and (now - specimen.collection_ts) > 120m + grace
      then VIOLATION
    exception_hook: "override_permitted_with_token(OVERRIDE_RISK_ACCEPTANCE, dual_approval=true)"
    signals: ["collection_ts", "separated_ts", "panel_id"]
    severity: "MAJOR"
    enforcement: ["HOLD_SPECIMEN", "BLOCK_START_RUN"]
    reason_code: "RC_STAB_NO_SEPARATION_WITHIN_WINDOW"

  - invariant_id: "INV-STAB-BIOCHEM-002"
    title: "Biochem collection-to-arrival <= 6 hours (pre-sep ambient)"
    trigger: { on_action: ["RECEIVE_BATCH", "ACCEPT_SPECIMEN"] }
    logic_template: >
      if specimen.panel == BIOCHEM_PANEL_CORE
      and (arrival_ts - collection_ts) > 360m + grace
      then VIOLATION
    exception_hook: "override_permitted_with_token(OVERRIDE_RISK_ACCEPTANCE, dual_approval=true)"
    signals: ["collection_ts", "arrival_ts", "panel_id"]
    severity: "MAJOR"
    enforcement: ["HOLD_SPECIMEN"]
    reason_code: "RC_STAB_CHEM_DELAYED_TO_LAB"

  - invariant_id: "INV-STAB-HAEM-001"
    title: "Haematology collection-to-arrival <= 24 hours"
    trigger: { on_action: ["RECEIVE_BATCH", "ACCEPT_SPECIMEN"] }
    logic_template: >
      if specimen.panel == HAEM_PANEL_CORE
      and (arrival_ts - collection_ts) > 1440m + grace
      then VIOLATION
    exception_hook: "override_permitted_with_token(OVERRIDE_RISK_ACCEPTANCE, dual_approval=true)"
    signals: ["collection_ts", "arrival_ts", "panel_id"]
    severity: "MINOR"
    enforcement: ["HOLD_SPECIMEN"]
    reason_code: "RC_STAB_HAEM_TOO_OLD"

  - invariant_id: "INV-TEMP-HAEM-001"
    title: "Haematology specimen must not be frozen"
    trigger: { on_action: ["RECEIVE_BATCH", "STORE", "RETRIEVE", "START_RUN"] }
    logic_template: >
      if specimen.panel == HAEM_PANEL_CORE
      and specimen.temp_band in {FROZEN_M20, FROZEN_M80}
      then VIOLATION
    exception_hook: "none"
    signals: ["temp_band", "panel_id"]
    severity: "CRITICAL"
    enforcement: ["HOLD_SPECIMEN", "BLOCK_START_RUN"]
    reason_code: "RC_TEMP_PROHIBITED_HAEM"

  - invariant_id: "INV-COAG-FILL-001"
    title: "Citrate tube must be filled to line for coagulation"
    trigger: { on_action: ["CHECK_ACCEPTANCE_RULES", "ACCEPT_SPECIMEN"] }
    logic_template: >
      if specimen.panel == COAG_PANEL_CORE
      and specimen.fill_ratio_ok == false
      then VIOLATION
    exception_hook: "none"
    signals: ["fill_ratio_ok", "panel_id", "container_type"]
    severity: "CRITICAL"
    enforcement: ["HOLD_SPECIMEN"]
    reason_code: "RC_COAG_FILL_INVALID"

  - invariant_id: "INV-STAB-COAG-001"
    title: "Coagulation collection-to-arrival <= 4 hours"
    trigger: { on_action: ["RECEIVE_BATCH", "ACCEPT_SPECIMEN"] }
    logic_template: >
      if specimen.panel == COAG_PANEL_CORE
      and (arrival_ts - collection_ts) > 240m + grace
      then VIOLATION
    exception_hook: "override_permitted_with_token(OVERRIDE_RISK_ACCEPTANCE, dual_approval=true)"
    signals: ["collection_ts", "arrival_ts", "panel_id"]
    severity: "MAJOR"
    enforcement: ["HOLD_SPECIMEN"]
    reason_code: "RC_STAB_COAG_DELAYED_TO_LAB"
