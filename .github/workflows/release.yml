# Build and publish on tag vX.Y.Z.
#
# PyPI: configure Trusted Publishing on https://pypi.org (OIDC) for this repo and
# workflow file; no long-lived PyPI password required. See docs/operations/releasing.md.
#
# GitHub Release: attaches wheel, sdist, SHA256SUMS.txt, and policy-bundle tarball.
name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy policy into package for wheel
        run: |
          mkdir -p src/labtrust_gym/policy
          cp -r policy/* src/labtrust_gym/policy/

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Prepare release assets (outside dist/ for clean PyPI upload)
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mkdir -p release-assets
          cd dist
          sha256sum *.whl *.tar.gz > ../release-assets/SHA256SUMS.txt
          cd ..
          tar czf "release-assets/policy-bundle-${VERSION}.tar.gz" policy/
          echo "=== SHA256SUMS (wheel + sdist only) ==="
          cat release-assets/SHA256SUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: |
            dist/
            release-assets/

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: .

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  github-release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz
            release-assets/SHA256SUMS.txt
            release-assets/policy-bundle-*.tar.gz

  live-llm-smoke:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    env:
      LABTRUST_ALLOW_NETWORK: "1"
      LABTRUST_LLM_TIMEOUT_S: "25"
      LABTRUST_OPENAI_MODEL: "gpt-4o-mini"
    steps:
      - name: Check for API key (skip if not set)
        id: check
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Live LLM smoke: OPENAI_API_KEY not set; skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev, env, plots)
        if: steps.check.outputs.skip != 'true'
        run: pip install -e ".[dev,env,plots]"

      - name: LLM healthcheck
        if: steps.check.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: labtrust llm-healthcheck --backend openai_responses --model gpt-4o-mini --allow-network

      - name: Official pack llm_live smoke
        if: steps.check.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          labtrust run-official-pack \
            --out ./llm_live_smoke_out \
            --pipeline-mode llm_live \
            --allow-network \
            --smoke \
            --seed-base 100
        timeout-minutes: 12

      - name: Upload llm_live artifacts
        if: steps.check.outputs.skip != 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: release-llm-live-smoke
          path: |
            llm_live_smoke_out/TRANSPARENCY_LOG/llm_live.json
            llm_live_smoke_out/live_evaluation_metadata.json
          retention-days: 14
