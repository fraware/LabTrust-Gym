registry_id: "LTR-INVREG-1.0-TOKENS"
registry_version: "1.0"
signals_required:
  - "MINT_TOKEN"
  - "REVOKE_TOKEN"
  - "CONSUME_TOKEN"
  - "PRE_ACTION_VALIDATE"
  - "POST_ACTION_LOG_HASH"
  - "token_store.active[token_id]"
  - "token_store.revoked[token_id]"
  - "token_store.consumed[token_id]"
  - "hashchain.head_hash"

invariants:

  - invariant_id: "INV-TOK-001"
    title: "Token minting requires valid signatures and authorized approver roles"
    severity: "S3"
    triggers: ["MINT_TOKEN"]
    logic_template: >
      on MINT_TOKEN(token):
        assert token.signature_bundle.payload_hash == hash(canonical(token without signature_bundle))
        for each approval in token.approvals:
          assert verify_sig(approval.signature, approval.approver_key_id, token.signature_bundle.payload_hash) == true
          assert approval.approver_role in token_registry.token_types[token.token_type].approver_roles
        assert approvals_count(token) == token_registry.token_types[token.token_type].approvals_required
        if approvals_required == 2:
          assert distinct(approval.approver_agent_id)
          assert distinct(approval.approver_key_id)
    enforcement: ["DENY_MINT_TOKEN", "SECURITY_INCIDENT_LOG"]
    reason_code: "AUDIT_CHAIN_BROKEN"

  - invariant_id: "INV-TOK-002"
    title: "Token must be active (not expired/revoked/consumed) at time of use"
    severity: "S3"
    triggers: ["PRE_ACTION_VALIDATE"]
    logic_template: >
      on PRE_ACTION_VALIDATE(action_request):
        for each token_ref in action_request.token_refs:
          token := token_store.get(token_ref)
          assert token.state == ACTIVE
          assert now() <= token.expires_at_ts
          assert token_ref not in token_store.revoked
          assert token_ref not in token_store.consumed
    enforcement: ["DENY_ACTION", "THROTTLE_AGENT"]
    reason_code: "AUDIT_CHAIN_BROKEN"

  - invariant_id: "INV-TOK-003"
    title: "Token scope must authorize the action (least privilege)"
    severity: "S3"
    triggers: ["PRE_ACTION_VALIDATE"]
    logic_template: >
      on PRE_ACTION_VALIDATE(action_request):
        token := select_required_token(action_request)  # based on token_enforcement_map
        assert action_request.action_type in token.scope.allowed_actions
        if action_request.door_id exists:
          assert action_request.door_id in token.scope.allowed_doors
        if action_request.to_zone exists:
          assert action_request.to_zone in token.scope.allowed_zones
        if action_request.reason_code exists:
          assert action_request.reason_code in token.scope.allowed_reason_codes OR token.scope.allowed_reason_codes absent
    enforcement: ["DENY_ACTION", "KILL_SWITCH_AGENT"]
    reason_code: "RBAC_DENY"

  - invariant_id: "INV-TOK-004"
    title: "Non-overridable reason codes cannot be bypassed by any token"
    severity: "S3"
    triggers: ["PRE_ACTION_VALIDATE"]
    logic_template: >
      on PRE_ACTION_VALIDATE(action_request):
        if action_request.reason_code in non_overridable_reason_codes():
          assert false
    enforcement: ["DENY_ACTION", "KILL_SWITCH_ZONE"]
    reason_code: "AUDIT_CHAIN_BROKEN"

  - invariant_id: "INV-TOK-005"
    title: "Token use must be logged and consumed (replay protection)"
    severity: "S2"
    triggers: ["POST_ACTION_LOG_HASH"]
    logic_template: >
      on POST_ACTION_LOG_HASH(event):
        for each token_ref in event.token_refs:
          emit CONSUME_TOKEN(token_ref, event.event_id)
          mark token_store.consumed[token_ref] = true
          assert token_ref cannot be referenced by any future event
    enforcement: ["FORENSIC_FREEZE_LOG", "THROTTLE_AGENT"]
    reason_code: "AUDIT_CHAIN_BROKEN"

  - invariant_id: "INV-TOK-006"
    title: "Revocation list is append-only and enforced immediately"
    severity: "S2"
    triggers: ["REVOKE_TOKEN", "PRE_ACTION_VALIDATE"]
    logic_template: >
      on REVOKE_TOKEN(token_id):
        assert token_id exists
        assert token_id not already revoked
        append to revocation_log (hashchained)
      on PRE_ACTION_VALIDATE(action_request):
        assert none(token_ref in token_store.revoked for token_ref in action_request.token_refs)
    enforcement: ["DENY_ACTION"]
    reason_code: "AUDIT_CHAIN_BROKEN"
