  - invariant_id: "INV-CRIT-005"
    title: "Critical comm record minimum fields (v0.2)"
    description: "ACK_CRITICAL_RESULT must include attempt_id and minimum_record_fields (receiver_identity, readback when required); else BLOCKED CRIT_ACK_MISSING_FIELDS."
    severity: "high"
    scope: "result"
    signals: []
    logic_template:
      type: "state"
      parameters:
        check: "critical_comm_record_fields"
    exception_hooks:
