<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Episode Simulation Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="app-header">
    <h1>Episode Simulation Viewer</h1>
    <p class="subtitle">Multi-agent lab simulation steps and actions. Load a bundle or episode log JSONL.</p>
  </header>

  <div class="loader">
    <label>Bundle</label>
    <input type="file" id="file-bundle" accept=".json,application/json" title="episode_bundle.json">
    <span class="divider" aria-hidden="true"></span>
    <label>Episode log</label>
    <input type="file" id="file-episode-log" accept=".jsonl,application/jsonl" title="episode log JSONL">
    <label>METHOD_TRACE</label>
    <input type="file" id="file-method-trace" accept=".jsonl,application/jsonl" title="METHOD_TRACE.jsonl">
    <label>coord_decisions</label>
    <input type="file" id="file-coord-decisions" accept=".jsonl,application/jsonl" title="coord_decisions.jsonl">
    <span class="divider" aria-hidden="true"></span>
    <button type="button" id="load-btn">Load</button>
    <button type="button" id="load-demo-btn" title="Load built-in demo bundle">Load demo</button>
    <div id="error"></div>
  </div>

  <div id="view" style="display: none;">
    <div class="pipeline-strip-wrap">
      <div class="label">Lab workflow (10 zones)</div>
      <div id="pipeline-strip" class="pipeline-strip" aria-label="Lab pipeline zones"></div>
    </div>
    <div class="view-toolbar">
      <div class="view-tabs">
        <button type="button" class="tab active" data-view="grid">Step x Agent</button>
        <button type="button" class="tab" data-view="zone">Zone-centric</button>
      </div>
      <div id="filters" class="filters"></div>
    </div>
    <div class="main-layout">
      <div id="grid-view" class="content-panel"></div>
      <div id="zone-view" class="content-panel" style="display: none;"></div>
      <div id="detail-panel" class="detail-panel"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    (function () {
      var fileBundle = document.getElementById('file-bundle');
      var fileEpisodeLog = document.getElementById('file-episode-log');
      var fileMethodTrace = document.getElementById('file-method-trace');
      var fileCoordDecisions = document.getElementById('file-coord-decisions');
      var loadBtn = document.getElementById('load-btn');
      var errorEl = document.getElementById('error');
      var viewEl = document.getElementById('view');

      function showError(msg) {
        errorEl.textContent = msg || '';
      }

      function loadFromBundle(file) {
        var reader = new FileReader();
        reader.onload = function () {
          try {
            var bundle = JSON.parse(reader.result);
            if (window.EpisodeViewer && window.EpisodeViewer.run) {
              viewEl.style.display = 'block';
              window.EpisodeViewer.run(bundle);
            }
            showError('');
          } catch (e) {
            showError('Parse failed: ' + (e && e.message ? e.message : String(e)));
          }
        };
        reader.readAsText(file, 'utf-8');
      }

      function readFile(file) {
        return new Promise(function (resolve, reject) {
          var r = new FileReader();
          r.onload = function () { resolve(r.result); };
          r.onerror = function () { reject(new Error('Read failed')); };
          r.readAsText(file, 'utf-8');
        });
      }
      function loadFromFiles() {
        var logFile = fileEpisodeLog.files[0];
        if (!logFile) {
          showError('Select at least the episode log JSONL.');
          return;
        }
        var mtFile = fileMethodTrace.files[0];
        var cdFile = fileCoordDecisions.files[0];
        Promise.all([
          readFile(logFile),
          mtFile ? readFile(mtFile) : Promise.resolve(null),
          cdFile ? readFile(cdFile) : Promise.resolve(null)
        ]).then(function (results) {
          var entries = window.EpisodeViewer.parseEpisodeLog(results[0]);
          var mtLines = results[1] ? window.EpisodeViewer.parseEpisodeLog(results[1]) : null;
          var cdLines = results[2] ? window.EpisodeViewer.parseEpisodeLog(results[2]) : null;
          var bundle = window.EpisodeViewer.mergeToBundle(entries, mtLines, cdLines);
          viewEl.style.display = 'block';
          window.EpisodeViewer.run(bundle);
          showError('');
        }).catch(function (e) {
          showError('Load failed: ' + (e && e.message ? e.message : String(e)));
        });
      }

      loadBtn.addEventListener('click', function () {
        showError('');
        if (fileBundle.files[0]) {
          loadFromBundle(fileBundle.files[0]);
          return;
        }
        if (fileEpisodeLog.files[0]) {
          loadFromFiles();
          return;
        }
        showError('Select a bundle JSON or episode log JSONL.');
      });

      document.getElementById('load-demo-btn').addEventListener('click', function () {
        showError('');
        fetch('demo_episode_bundle.json')
          .then(function (r) { if (!r.ok) throw new Error(r.status); return r.json(); })
          .then(function (bundle) {
            viewEl.style.display = 'block';
            if (window.EpisodeViewer && window.EpisodeViewer.run) {
              window.EpisodeViewer.run(bundle);
            }
          })
          .catch(function (e) {
            showError('Demo load failed (serve this folder over HTTP or open demo_episode_bundle.json via Load). ' + (e && e.message ? e.message : String(e)));
          });
      });
    })();
  </script>
</body>
</html>
