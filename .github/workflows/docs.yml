# Build and deploy MkDocs site + risk register viewer + viewer-data/latest to GitHub Pages (only on main)
name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and docs extra
        run: pip install -e ".[docs]"

      - name: Build MkDocs
        run: mkdocs build --strict

      - name: Install package for viewer-data build
        run: pip install -e ".[dev,env,plots]"

      - name: Build viewer-data from release
        run: bash scripts/build_viewer_data_from_release.sh

      - name: Assemble site with viewer and viewer-data
        run: |
          cp -r viewer site/viewer
          cp -r viewer-data site/viewer-data

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
