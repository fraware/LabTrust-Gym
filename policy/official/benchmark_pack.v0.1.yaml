# Official Benchmark Pack v0.1: minimal, stable pack for external researchers.
# Fixed tasks (core + coordination), scales (S/M/L), baselines, coordination methods, security suite definitions.
# Results semantics v0.2 remains canonical. CLI: labtrust run-official-pack --out <dir> --seed-base N.

version: "0.1"
description: "Official benchmark pack: tasks, scales, baselines, coordination methods, security suite (smoke/full), required reports."

tasks:
  core:
    - throughput_sla
    - stat_insertion
    - qc_cascade
    - adversarial_disruption
    - multi_site_stat
    - insider_key_misuse
  coordination:
    - coord_scale
    - coord_risk
  experimental:
    []  # Optional device_outage_surge, reagent_stockout when defined; leave empty for v0.1

scale_configs:
  S:
    name: "Small"
    num_agents_total: 4
    num_devices: 2
    num_sites: 1
    arrival_rate: 1.0
    horizon_steps: 100
  M:
    name: "Medium"
    num_agents_total: 8
    num_devices: 4
    num_sites: 1
    arrival_rate: 2.0
    horizon_steps: 200
  L:
    name: "Large"
    num_agents_total: 16
    num_devices: 8
    num_sites: 2
    arrival_rate: 3.0
    horizon_steps: 300

# For coord_scale/coord_risk, value is coordination method_id (suffix _v0 stripped by runner).
baselines:
  throughput_sla: scripted_ops_v1
  stat_insertion: scripted_ops_v1
  qc_cascade: scripted_ops_v1
  adversarial_disruption: adversary_v1
  multi_site_stat: scripted_ops_v1
  insider_key_misuse: insider_v1
  coord_scale: kernel_scheduler_or_v0
  coord_risk: kernel_scheduler_or_v0

coordination_methods:
  - centralized_planner
  - hierarchical_hub_rr
  - llm_constrained

security_suite:
  smoke:
    enabled: true
    description: "Smoke: attacks with smoke true; CI and pack default."
  full:
    enabled: false
    description: "Full: all attacks; use --full when running pack."

required_reports:
  - security
  - safety_case
  - transparency_log

# Optional: when enabled, run coordination security pack into coordination_pack/ and build lab report
coordination_pack:
  enabled: false
  matrix_preset: hospital_lab
