name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_bench_smoke:
        description: "Run benchmark smoke (1 episode per task)"
        required: false
        default: false
        type: boolean

env:
  LABTRUST_BENCH_SMOKE: ${{ (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_bench_smoke == 'true')) && '1' || '0' }}

jobs:
  lint-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff format check
        run: ruff format --check .
      - name: Ruff check
        run: ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest -q

  policy-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Validate policy
        run: labtrust validate-policy

  bench-smoke:
    runs-on: ubuntu-latest
    if: env.LABTRUST_BENCH_SMOKE == '1'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package with env deps
        run: pip install -e ".[dev,env]"
      - name: Benchmark smoke (1 episode per task)
        run: labtrust bench-smoke --seed 42
