token_enforcement_map:
  version: "0.1"

  # Restricted movement / doors
  - action_type: "OPEN_DOOR"
    match:
      door_id: "D_RESTRICTED_AIRLOCK"
    requires_token_type: "TOKEN_RESTRICTED_ENTRY"
    severity_on_violation: "P0_STOP"
    reason_code: "RBAC_RESTRICTED_ENTRY_DENY"

  - action_type: "MOVE"
    match:
      to_zone: "Z_RESTRICTED_BIOHAZARD"
    requires_token_type: "TOKEN_RESTRICTED_ENTRY"
    severity_on_violation: "P0_STOP"
    reason_code: "RBAC_RESTRICTED_ENTRY_DENY"

  # Overrides of pre-analytical constraints
  - action_type: "OVERRIDE_ACCEPTANCE"
    requires_token_type: "OVERRIDE_RISK_ACCEPTANCE"
    requires_reason_code: true

  - action_type: "START_RUN_OVERRIDE"
    requires_token_type: "OVERRIDE_RISK_ACCEPTANCE"
    requires_reason_code: true

  # QC drift (not QC fail) override for controlled release
  - action_type: "RELEASE_RESULT_OVERRIDE"
    match:
      reason_code: "QC_DRIFT_SUSPECTED"
    requires_token_type: "TOKEN_QC_DRIFT_OVERRIDE"

  # Emergency access (rare)
  - action_type: "EMERGENCY_BYPASS"
    requires_token_type: "TOKEN_EMERGENCY_ACCESS"
