# Optional real-backend smoke: healthcheck + minimal llm_live pack run.
# Runs only on workflow_dispatch and nightly; does not run on push/PR (never blocks merges).
# When OPENAI_API_KEY is not set: skips cleanly with success. When set: runs smoke and uploads artifacts.
# Guardrails: LABTRUST_LLM_TIMEOUT_S=25, gpt-4o-mini, pack step timeout 12 min.
name: LLM live optional smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  llm-live-smoke:
    runs-on: ubuntu-latest
    env:
      LABTRUST_ALLOW_NETWORK: "1"
      LABTRUST_LLM_TIMEOUT_S: "25"
      LABTRUST_OPENAI_MODEL: "gpt-4o-mini"
    steps:
      - name: Check for API key (skip if not set)
        id: check
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Optional LLM live smoke: OPENAI_API_KEY not set; skipping (no failure)."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package (dev, env, plots)
        if: steps.check.outputs.skip != 'true'
        run: pip install -e ".[dev,env,plots]"

      - name: LLM healthcheck (openai_responses, gpt-4o-mini)
        if: steps.check.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          labtrust llm-healthcheck --backend openai_responses --model gpt-4o-mini --allow-network

      - name: Official pack llm_live smoke (produces TRANSPARENCY_LOG/llm_live.json, live_evaluation_metadata.json)
        if: steps.check.outputs.skip != 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          labtrust run-official-pack \
            --out ./llm_live_smoke_out \
            --pipeline-mode llm_live \
            --allow-network \
            --smoke \
            --seed-base 100
        timeout-minutes: 12

      - name: Assert E2E real LLM (model, latency/cost in artifacts)
        if: steps.check.outputs.skip != 'true' && success()
        run: |
          python -c "
          import json
          from pathlib import Path
          llm_path = Path('llm_live_smoke_out/TRANSPARENCY_LOG/llm_live.json')
          meta_path = Path('llm_live_smoke_out/live_evaluation_metadata.json')
          errs = []
          if llm_path.exists():
              d = json.loads(llm_path.read_text(encoding='utf-8'))
              mid = (d.get('model_version_identifiers') or {}).get('llm_model_id')
              if not mid or not str(mid).strip():
                  errs.append('llm_live.json: model_version_identifiers.llm_model_id missing or empty')
              lc = d.get('latency_and_cost_statistics') or {}
              if not lc.get('mean_latency_ms') and not lc.get('estimated_cost_usd') and not lc.get('total_tokens'):
                  errs.append('llm_live.json: no latency/cost statistics (mean_latency_ms, estimated_cost_usd, or total_tokens)')
          else:
              errs.append('llm_live.json not found')
          if meta_path.exists():
              m = json.loads(meta_path.read_text(encoding='utf-8'))
              if not m.get('model_id'):
                  errs.append('live_evaluation_metadata.json: model_id missing or empty')
          if errs:
              raise SystemExit('E2E LLM assertions failed: ' + '; '.join(errs))
          "
      - name: Upload llm_live artifacts (for regression inspection)
        if: steps.check.outputs.skip != 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: llm_live_smoke_artifacts
          path: |
            llm_live_smoke_out/TRANSPARENCY_LOG/llm_live.json
            llm_live_smoke_out/live_evaluation_metadata.json
          retention-days: 14
