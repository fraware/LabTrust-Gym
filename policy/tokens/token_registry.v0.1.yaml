token_registry:
  version: "0.1"
  crypto:
    signature_alg: "ed25519"
    canonicalization: "JCS"          # JSON Canonicalization Scheme-like
    hash_alg: "sha256"
  lifecycle:
    states: ["MINTED", "ACTIVE", "CONSUMED", "EXPIRED", "REVOKED"]
    consume_semantics: "SINGLE_USE"  # prevents replay
  required_fields:
    - token_id
    - token_type
    - issued_at_ts
    - expires_at_ts
    - subject_type          # "agent" | "zone" | "device" | "specimen" | "result"
    - subject_id
    - scope
    - reason_code           # must exist for any override-style token
    - approvals             # list of approvals (may be 1 or 2)
    - nonce
    - signature_bundle

  token_types:

    TOKEN_RESTRICTED_ENTRY:
      purpose: "Enter restricted zone / open restricted airlock."
      subject_type: ["agent"]
      scope:
        allowed_actions: ["OPEN_DOOR", "MOVE"]
        allowed_doors: ["D_RESTRICTED_AIRLOCK"]
        allowed_zones: ["Z_RESTRICTED_BIOHAZARD"]
      ttl_s: 900
      approvals_required: 1
      approver_roles: ["ROLE_SUPERVISOR"]
      non_delegable: true
      revocable: true
      reason_code_required: true
      reason_codes_allowed: ["RBAC_RESTRICTED_ENTRY_DENY", "SYS_DOWNTIME_ACTIVE"]  # narrative reason for access

    OVERRIDE_RISK_ACCEPTANCE:
      purpose: "Allow borderline pre-analytic acceptance or stability/cold-chain exceptions with explicit risk acceptance."
      subject_type: ["specimen", "result"]
      scope:
        allowed_actions:
          - "OVERRIDE_ACCEPTANCE"
          - "START_RUN_OVERRIDE"
          - "RELEASE_RESULT_OVERRIDE"
        allowed_reason_codes:
          - "TIME_EXPIRED"
          - "TIME_NO_SEPARATION_WITHIN_WINDOW"
          - "TEMP_OUT_OF_BAND"
          - "INT_INSUFFICIENT_VOLUME"
          - "INT_HEMOLYSED"
          - "CNT_WRONG_CONTAINER"
          - "REQ_MISSING_OR_INCOMPATIBLE"
      ttl_s: 3600
      approvals_required: 2
      approver_roles:
        - "ROLE_SUPERVISOR"
        - "ROLE_CLINICAL_SCIENTIST"   # stands in for medically-led signoff
      separation_of_duties:
        distinct_agent_ids: true
        distinct_signing_keys: true
      revocable: true
      reason_code_required: true
      requires_structured_risk_record: true

    TOKEN_EMERGENCY_ACCESS:
      purpose: "Emergency bypass of RBAC for life-threatening workflow continuity (rare, auditable, timeboxed)."
      subject_type: ["agent", "zone", "device"]
      scope:
        allowed_actions: ["MOVE", "OPEN_DOOR", "DEVICE_ACTION"]
        denylist_reason_codes: ["ID_MISMATCH", "ID_UNATTRIBUTABLE", "QC_FAIL_ACTIVE", "AUDIT_CHAIN_BROKEN"]  # cannot be overridden
      ttl_s: 900
      approvals_required: 2
      approver_roles: ["ROLE_SUPERVISOR", "ROLE_SECURITY_OFFICER"]
      separation_of_duties: { distinct_agent_ids: true, distinct_signing_keys: true }
      revocable: true
      reason_code_required: true
      requires_posthoc_review: true

    TOKEN_MAINTENANCE_MODE:
      purpose: "Permit maintenance actions (e.g., door open longer, device quarantining) with explicit labeling."
      subject_type: ["door", "device", "zone"]
      scope:
        allowed_actions: ["OPEN_DOOR_EXTENDED", "DEVICE_MAINTENANCE", "DEVICE_RESET"]
      ttl_s: 1800
      approvals_required: 1
      approver_roles: ["ROLE_ENGINEERING", "ROLE_SUPERVISOR"]
      revocable: true
      reason_code_required: true

    TOKEN_QC_DRIFT_OVERRIDE:
      purpose: "Allow controlled release under QC drift suspicion (NOT QC fail) with enhanced audit + disclaimers."
      subject_type: ["result", "run"]
      scope:
        allowed_actions: ["RELEASE_RESULT_OVERRIDE"]
        allowed_reason_codes: ["QC_DRIFT_SUSPECTED"]
      ttl_s: 1800
      approvals_required: 1
      approver_roles: ["ROLE_QC"]
      revocable: true
      reason_code_required: true
      constraints:
        deny_if_qc_fail_active: true
        requires_disclaimer_flag: true

  approval_schema:
    fields:
      - approver_agent_id
      - approver_role
      - approver_key_id
      - approved_at_ts
      - approval_rationale_hash      # hash of structured rationale record
      - signature                   # signature over canonical token payload (minus signature_bundle)

  signature_bundle_schema:
    fields:
      - payload_hash
      - signatures[]                # one per approval + optional issuer signature
      - issuer_key_id

  revocation:
    method: "CRL_APPEND_ONLY"
    event_type: "REVOKE_TOKEN"
    required_fields: ["token_id", "revoked_at_ts", "revoked_by_agent_id", "reason_code"]
