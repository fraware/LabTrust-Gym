emits_vocab:
  version: "0.1"
  policy:
    - "Engines MUST only emit event types listed here."
    - "Adding new emit types requires a version bump and changelog."
    - "Golden suite enforces strict validation (unknown emit => scenario fails)."

  categories:

    reception_accession:
      - "RECEIVE_BATCH"
      - "SCAN_LABEL"
      - "CREATE_ACCESSION"
      - "CHECK_ACCEPTANCE_RULES"
      - "ACCEPT_SPECIMEN"
      - "REJECT_SPECIMEN"
      - "HOLD_SPECIMEN"
      - "ASSIGN_LANE"

    movement_storage:
      - "MOVE"
      - "STORE"
      - "RETRIEVE"
      - "OPEN_DOOR"
      - "CLOSE_DOOR"

    preanalytics:
      - "CENTRIFUGE_START"
      - "CENTRIFUGE_END"
      - "ALIQUOT_CREATE"
      - "ALIQUOT_LABEL"
      - "RACK_BUILD"
      - "RACK_SEAL"

    analytics_execution:
      - "QUEUE_RUN"
      - "START_RUN"
      - "END_RUN"
      - "QC_EVENT"
      - "RERUN_REQUEST"
      - "REROUTE_TO_ALT_DEVICE"

    results_release:
      - "GENERATE_RESULT"
      - "CLASSIFY_RESULT"
      - "AUTO_VERIFICATION_CHECK"
      - "HOLD_RESULT"
      - "RELEASE_RESULT"
      - "AMEND_RESULT"

    critical_results:
      - "NOTIFY_CRITICAL_RESULT"
      - "ACK_CRITICAL_RESULT"
      - "ESCALATE_CRITICAL_RESULT"

    transport:
      - "DISPATCH_TRANSPORT"
      - "TRANSPORT_TICK"
      - "RECEIVE_TRANSPORT"
      - "CHAIN_OF_CUSTODY_SIGN"

    trust_skeleton_tokens:
      - "MINT_TOKEN"
      - "CONSUME_TOKEN"
      - "REVOKE_TOKEN"

    safety_controls:
      - "THROTTLE_AGENT"
      - "KILL_SWITCH_AGENT"
      - "KILL_SWITCH_ZONE"
      - "KILL_SWITCH_DEVICE"
      - "ALARM"

    audit_integrity:
      - "AUDIT_LOG_APPEND"
      - "FORENSIC_FREEZE_LOG"
      - "OPEN_INVESTIGATION_LOG"
      - "OPEN_QC_INVESTIGATION_LOG"
      - "SECURITY_INCIDENT_LOG"
      - "LLM_ACTION_FILTERED"

  # Flattened canonical set (for fast validation)
  canonical_set:
    - "RECEIVE_BATCH"
    - "SCAN_LABEL"
    - "CREATE_ACCESSION"
    - "CHECK_ACCEPTANCE_RULES"
    - "ACCEPT_SPECIMEN"
    - "REJECT_SPECIMEN"
    - "HOLD_SPECIMEN"
    - "ASSIGN_LANE"
    - "MOVE"
    - "STORE"
    - "RETRIEVE"
    - "OPEN_DOOR"
    - "CLOSE_DOOR"
    - "CENTRIFUGE_START"
    - "CENTRIFUGE_END"
    - "ALIQUOT_CREATE"
    - "ALIQUOT_LABEL"
    - "RACK_BUILD"
    - "RACK_SEAL"
    - "QUEUE_RUN"
    - "START_RUN"
    - "END_RUN"
    - "QC_EVENT"
    - "RERUN_REQUEST"
    - "REROUTE_TO_ALT_DEVICE"
    - "GENERATE_RESULT"
    - "CLASSIFY_RESULT"
    - "AUTO_VERIFICATION_CHECK"
    - "HOLD_RESULT"
    - "RELEASE_RESULT"
    - "AMEND_RESULT"
    - "NOTIFY_CRITICAL_RESULT"
    - "ACK_CRITICAL_RESULT"
    - "ESCALATE_CRITICAL_RESULT"
    - "DISPATCH_TRANSPORT"
    - "TRANSPORT_TICK"
    - "RECEIVE_TRANSPORT"
    - "CHAIN_OF_CUSTODY_SIGN"
    - "MINT_TOKEN"
    - "CONSUME_TOKEN"
    - "REVOKE_TOKEN"
    - "THROTTLE_AGENT"
    - "KILL_SWITCH_AGENT"
    - "KILL_SWITCH_ZONE"
    - "KILL_SWITCH_DEVICE"
    - "ALARM"
    - "AUDIT_LOG_APPEND"
    - "FORENSIC_FREEZE_LOG"
    - "OPEN_INVESTIGATION_LOG"
    - "OPEN_QC_INVESTIGATION_LOG"
    - "SECURITY_INCIDENT_LOG"
    - "LLM_ACTION_FILTERED"