# Risk-to-injection mapping v0.1: which injection_ids cover which risk_id.
# Used by coordination study preflight: for every required_bench risk_id there must be
# at least one injection in the study spec that covers it (or the risk is waived).
# If a risk_id is missing here, fallback is risk_registry.suggested_injections.

version: "0.1"
description: "Maps risk_id to injection_ids that cover that risk (directly or via injections.v0.2)."

mappings:
  - risk_id: "R-TOOL-001"
    injection_ids: ["inj_tool_selection_noise"]
    notes: "Tool selection errors; legacy or INJ-* if defined."
  - risk_id: "R-SYS-001"
    injection_ids: ["inj_dos_flood", "INJ-DOS-PLANNER-001", "INJ-TIMING-QUEUE-001"]
    notes: "DoS / planner exhaustion; timing/queue (tail-latency)."
  - risk_id: "R-COMMS-001"
    injection_ids: ["inj_impersonation", "inj_replay", "INJ-ID-SPOOF-001", "INJ-COORD-PLAN-REPLAY-001"]
    notes: "Identity spoofing, replay."
  - risk_id: "R-SYS-002"
    injection_ids: ["inj_collusion_handoff", "INJ-COLLUSION-001", "INJ-COORD-BID-SHILL-001", "INJ-BID-SPOOF-001"]
    notes: "Collusion, bid shilling."
  - risk_id: "R-COMMS-002"
    injection_ids: ["inj_msg_poison", "inj_obs_tamper", "INJ-COMMS-POISON-001", "INJ-CONSENSUS-POISON-001", "INJ-BLAME-SHIFT-001"]
    notes: "Comms poisoning; consensus poison; blame shift."
  - risk_id: "R-DATA-001"
    injection_ids: ["inj_untrusted_payload", "INJ-COMMS-POISON-001", "INJ-BID-SPOOF-001"]
    notes: "Untrusted data; bid spoof, comms poison."
  - risk_id: "R-DATA-002"
    injection_ids: ["inj_poison_obs", "inj_poison_reward", "INJ-PARTIAL-OBS-001"]
    notes: "Reward/obs poisoning; partial observability (sensor dropout)."
  - risk_id: "R-DATA-003"
    injection_ids: ["inj_memory_tamper", "INJ-MEMORY-POISON-001"]
    notes: "Memory poisoning."
  - risk_id: "R-TOOL-005"
    injection_ids: ["inj_misparam_device", "inj_misparam_zone", "INJ-TOOL-MISPARAM-001"]
    notes: "Misparameterization."
  - risk_id: "R-TOOL-006"
    injection_ids: ["inj_tool_injection", "inj_privilege_probe"]
    notes: "Tool vulnerability."
  - risk_id: "R-CAP-001"
    injection_ids: ["inj_jailbreak", "inj_prompt_injection", "INJ-LLM-PROMPT-INJECT-COORD-001", "INJ-COORD-PROMPT-INJECT-001"]
    notes: "Jailbreak, prompt injection."
