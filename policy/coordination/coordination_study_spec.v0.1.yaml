# Coordination study spec v0.1: deterministic experiment matrix for coordination benchmarks.
# study_id identifies the study; scales/methods/risks/injections define the Cartesian grid (data-driven).
# seed_base + seed_offset per injection ensure deterministic, reproducible runs.

study_id: "coordination_baseline_v0.1"
version: "0.1"
seed_base: 42
episodes_per_cell: 4

scales:
  - name: num_agents
    values: [2, 4]
  - name: num_sites
    values: [1]
  - name: num_devices
    values: [2, 4]
  - name: arrival_rate
    values: [1.0]
  - name: horizon_steps
    values: [200]

methods:
  - centralized_planner
  - hierarchical_hub_rr
  - llm_constrained
  # LLM coordination methods (use with --llm-backend=deterministic or live)
  - llm_central_planner
  - llm_hierarchical_allocator
  - llm_auction_bidder
  - llm_gossip_summarizer

risks:
  - R-TOOL-001
  - R-SYS-001
  - R-CAP-001

injections:
  - injection_id: inj_tool_selection_noise
    intensity: 0.1
    seed_offset: 0
  - injection_id: inj_prompt_injection
    intensity: 1
    seed_offset: 100
  - injection_id: inj_dos_flood
    intensity: 0.2
    seed_offset: 200
  # TaskH risk harness (deterministic, auditable)
  - injection_id: INJ-COMMS-POISON-001
    intensity: 0.2
    seed_offset: 300
  - injection_id: INJ-COMMS-DELAY-001
    intensity: 0.3
    seed_offset: 301
  - injection_id: INJ-COMMS-DROP-001
    intensity: 0.15
    seed_offset: 302
  - injection_id: INJ-COMMS-REORDER-001
    intensity: 0.25
    seed_offset: 303
  - injection_id: INJ-CLOCK-SKEW-001
    intensity: 0.3
    seed_offset: 304
  - injection_id: INJ-ID-SPOOF-001
    intensity: 0.5
    seed_offset: 400
  - injection_id: INJ-DOS-PLANNER-001
    intensity: 0.3
    seed_offset: 500
  - injection_id: INJ-COLLUSION-001
    intensity: 0.2
    seed_offset: 600
  - injection_id: INJ-TOOL-MISPARAM-001
    intensity: 0.2
    seed_offset: 700
  - injection_id: INJ-MEMORY-POISON-001
    intensity: 0.15
    seed_offset: 800
  - injection_id: INJ-BID-SPOOF-001
    intensity: 0.5
    seed_offset: 900
