# Nightly: build release candidate artifact (package-release --profile minimal) and upload.
# Not run on normal push/PR to keep CI fast.
name: Package release (nightly)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  package-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with env and plots
        run: pip install -e ".[dev,env,plots]"

      - name: Run package-release (minimal)
        run: |
          labtrust package-release --profile minimal --out release_artifact --seed-base 100
        env:
          LABTRUST_REPRO_SMOKE: "1"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: labtrust-release-artifact
          path: release_artifact/
          retention-days: 7
