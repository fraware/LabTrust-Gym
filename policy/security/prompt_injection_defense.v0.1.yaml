# Prompt-injection defense policy v0.1.
# Layered defenses: pre-LLM block, optional sanitization, output consistency.
# Used by security.prompt_injection_defense and LLM agent integration.
#
version: "0.1"
block_severity_threshold: 2
block_reason_code: "PROMPT_INJECTION_DETECTED"
sanitizer_mode: "none"
max_untrusted_chars: 200
sanitize_redaction_severity: 1
output_consistency_check: true
min_verbatim_len: 20
# Normalize output and untrusted samples before verbatim comparison (evasion hardening). Default on so PI-EVASION-* output is flagged; set false for legacy behavior.
output_consistency_normalize: true
output_consistency_normalizers: ["strip_format_chars", "nfkc", "collapse_whitespace"]
check_split_verbatim: true  # Flag if two contiguous segments of a sample appear adjacently in normalized output (PI-EVASION-SPLIT).
adversarial_policy: "adversarial_detection.v0.1.yaml"
