# Smoke test: build wheel, install in fresh venv, run core CLI (validate-policy, quick-eval).
# Ensures the built package is installable and core commands work without editable install.

name: Wheel smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  wheel-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        run: |
          python -m pip install build
          python -m build --wheel --outdir dist .
      - name: Create venv and install wheel
        run: |
          python -m venv .venv-wheel
          .venv-wheel/bin/pip install dist/*.whl
          .venv-wheel/bin/pip install '.[env]'  # quick-eval uses env
          .venv-wheel/bin/pip install pytest  # audit-selfcheck doctor (extras_dev) and risk_register_contract_gate
      - name: Audit selfcheck (doctor)
        run: .venv-wheel/bin/labtrust audit-selfcheck --out ./audit_out
      - name: Validate policy
        run: .venv-wheel/bin/labtrust validate-policy
      - name: Quick eval (smoke)
        run: .venv-wheel/bin/labtrust quick-eval --seed 42
