      - type: injection
        ref: "INJ-TOOL-MISUSE-001"
    notes: "Tool misuse: wrong context (device_id) denied; INJ-TOOL-MISUSE-001 + test_tool_misuse_wrong_device_blocked."

  - risk_id: "R-TOOL-005"
