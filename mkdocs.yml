plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            docstring_style: google
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.snippets
  - pymdownx.superfences
