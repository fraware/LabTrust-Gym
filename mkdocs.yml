# MkDocs config for LabTrust-Gym documentation site
site_name: LabTrust-Gym
site_description: Multi-agent environment for a self-driving hospital lab (PettingZoo/Gym style) with trust skeleton
site_url: https://fraware.github.io/LabTrust-Gym/
repo_url: https://github.com/fraware/LabTrust-Gym
repo_name: fraware/LabTrust-Gym
edit_uri: edit/main/docs/

docs_dir: docs
strict: true

theme:
  name: readthedocs
  highlightjs: true

nav:
  - Overview: index.md
  - Installation: installation.md
  - Build your own agent: build_your_own_agent.md
  - Repository structure: repository_structure.md
  - Architecture: architecture.md
  - Systems and threat model: systems_and_threat_model.md
  - Architecture diagrams: diagrams.md
  - Policy pack and schemas: policy_pack.md
  - Coordination policy (risk and method registry): coordination_policy.md
  - Coordination methods (baselines at scale): coordination_methods.md
  - Coordination method contract (v0.1): coordination_method_contract.md
  - SOTA coordination methods roadmap: coordination/sota_methods_at_scale.md
  - Learning methods implementation strategy: coordination/learning_methods_implementation_strategy.md
  - Coordination scale generator: coordination_scale.md
  - Coordination matrix: coordination_matrix.md
  - Coordination matrix contract (v0.1): coordination_matrix_contract.md
  - Invariants and enforcement:
    - Invariant registry: invariants_registry.md
    - Enforcement: enforcement.md
    - FHIR R4 export: fhir_export.md
    - Evidence bundle verification: evidence_verification.md
    - Security attack suite and securitization packet: security_attack_suite.md
  - Contracts and UI:
    - Frozen contracts: frozen_contracts.md
    - Extension development: extension_development.md
    - UI data contract: ui_data_contract.md
    - Risk register (bundle, generate, review): risk_register.md
    - Risk register contract (v0.1): risk_register_contract.v0.1.md
    - Risk register viewer: risk_register_viewer.md
  - PettingZoo API: pettingzoo_api.md
  - Benchmarks, studies, plots:
    - Benchmarks: benchmarks.md
    - Example experiments (trust vs performance): example_experiments.md
    - Benchmark card: benchmark_card.md
    - Benchmarking plan (three-layer matrix): benchmarking_plan.md
    - Studies and plots: studies.md
    - Coordination studies (run and Pareto): coordination_studies.md
    - Coordination benchmark card (TaskG/TaskH): coordination_benchmark_card.md
    - Official benchmark pack (v0.1): official_benchmark_pack.md
    - Scale and operational limits: scale_operational_limits.md
    - Reproduce (minimal results + figures): reproduce.md
    - Paper-ready release: paper_ready.md
    - Paper provenance (figures, tarball): paper/README.md
  - Implementation verification (safety case, controls): implementation_verification.md
  - Reproducible builds (SLSA-ish): reproducible_builds.md
  - Threat model: threat_model.md
  - Security monitoring (adversarial detection): security_monitoring.md
  - Prompt-injection defense: prompt_injection_defense.md
  - Online mode: online_mode.md
  - Security controls (online): security_online.md
  - Output controls (B009): output_controls.md
  - Queue contract: queue_contract.v0.1.md
  - MARL baselines: marl_baselines.md
  - MARL multi-agent design: marl_multi_agent_design.md
  - LLM baselines: llm_baselines.md
  - Live LLM benchmark mode: llm_live.md
  - Contributing: contributing.md
  - Testing strategy (fuzz and metamorphic): testing_strategy.md
  - CI: ci.md
  - STATUS: STATUS.md
  - Modular fork roadmap (platform and HSL core): MODULAR_FORK_ROADMAP.md
  - Workflow / domain spec: workflow_domain_spec.md
  - Forker guide: FORKER_GUIDE.md
  - Troubleshooting: troubleshooting.md
  - How-to guides:
    - Add coordination method: howto_add_coordination_method.md
    - Add risk injection: howto_add_injection.md
    - Tune selection policy: howto_selection_policy.md
    - Security and gate failures: howto_security_gate_failures.md
  - Release checklist: release_checklist.md
  - Pipeline overview: pipeline_overview.md
  - API Reference: api/index.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            docstring_style: google
            members_order: source

markdown_extensions:
  - admonition
  - pymdownx.snippets
  - pymdownx.superfences
