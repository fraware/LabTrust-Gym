# Coordination method registry v0.1: methods to compare in coordination benchmarks.
# method_id is referenced by method_risk_matrix and coordination_study_spec.
# known_weaknesses and compatible_injections reference risk_id and injection_id from risk registry.

coordination_methods:
  version: "0.1"
  methods:
    - method_id: "kernel_centralized_edf"
      name: "Kernel composed (centralized alloc + EDF sched + trivial router)"
      coordination_class: centralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-001", "R-COMMS-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail", "inj_dos_flood"]
      default_params: {}

    - method_id: "kernel_whca"
      name: "Kernel composed (centralized alloc + EDF sched + WHCA* reservation router)"
      coordination_class: centralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-001", "R-COMMS-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail", "inj_dos_flood"]
      default_params:
        whca_horizon: 15

    - method_id: "kernel_scheduler_or"
      name: "Kernel OR scheduler (centralized alloc + rolling-horizon OR sched + trivial router)"
      coordination_class: centralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-001", "R-COMMS-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail", "inj_dos_flood"]
      default_params: {}

    - method_id: "kernel_scheduler_or_whca"
      name: "Kernel OR scheduler + WHCA* (centralized alloc + OR sched + WHCA* router)"
      coordination_class: centralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-001", "R-COMMS-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail", "inj_dos_flood"]
      default_params:
        whca_horizon: 15

    - method_id: "centralized_planner"
      name: "Centralized planner"
      coordination_class: centralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-001", "R-COMMS-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail", "inj_dos_flood"]
      default_params: {}

    - method_id: "hierarchical_hub_rr"
      name: "Hierarchical hub with rapid response"
      coordination_class: hierarchical
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-002", "R-COMMS-002", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "message_auth"]
      compatible_injections: ["inj_tool_selection_noise", "inj_msg_poison", "inj_collusion_handoff"]
      default_params: {}

    - method_id: "hierarchical_hub_local"
      name: "Hierarchical hub with local controllers (EDF + route per region)"
      coordination_class: hierarchical
      scaling_knobs: ["num_agents", "num_sites", "num_regions", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-SYS-002", "R-COMMS-002", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC", "message_auth", "handoff_ack_deadline"]
      compatible_injections: ["inj_tool_selection_noise", "inj_msg_poison", "inj_collusion_handoff"]
      default_params:
        ack_deadline_steps: 10
        sla_horizon: 20

    - method_id: "market_auction"
      name: "Market / contract net (auction)"
      coordination_class: market
      scaling_knobs: ["num_agents", "num_devices", "arrival_rate"]
      known_weaknesses: ["R-DATA-001", "R-COMMS-002", "R-TOOL-006"]
      required_controls: ["signed_actions", "RBAC", "rate_limit", "message_auth"]
      compatible_injections: ["inj_untrusted_payload", "inj_msg_poison"]
      default_params: {}

    - method_id: "gossip_consensus"
      name: "Gossip consensus"
      coordination_class: decentralized
      scaling_knobs: ["num_agents", "num_sites", "horizon_steps"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-003", "R-FLOW-002"]
      required_controls: ["message_auth", "rate_limit"]
      compatible_injections: ["inj_msg_poison", "inj_memory_tamper"]
      default_params: {}

    - method_id: "ripple_effect"
      name: "Ripple effect (local intent + signed bus, neighbor propagation)"
      coordination_class: decentralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-FLOW-002"]
      required_controls: ["message_auth", "replay_protection", "signed_actions"]
      compatible_injections: ["INJ-COMMS-POISON-001", "INJ-CONSENSUS-POISON-001", "INJ-ID-SPOOF-001"]
      default_params: {}

    - method_id: "swarm_reactive"
      name: "Swarm reactive"
      coordination_class: swarm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-FLOW-001", "R-SYS-001"]
      required_controls: ["RBAC", "rate_limit"]
      compatible_injections: ["inj_tool_selection_noise", "inj_dos_flood"]
      default_params: {}

    - method_id: "marl_ppo"
      name: "MARL PPO (optional stub)"
      coordination_class: learning
      scaling_knobs: ["num_agents", "num_devices", "horizon_steps"]
      known_weaknesses: ["R-DATA-002", "R-FLOW-002", "R-TOOL-004"]
      required_controls: ["RBAC", "rate_limit"]
      compatible_injections: ["inj_poison_obs", "inj_stuck_state"]
      default_params: {}

    - method_id: "llm_constrained"
      name: "LLM constrained (existing baseline)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-TOOL-005", "R-CAP-001", "R-DATA-001"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_jailbreak", "inj_misparam_device"]
      default_params: {}

    - method_id: "llm_central_planner"
      name: "LLM central planner (global state digest -> CoordinationProposal)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-TOOL-005", "R-CAP-001", "R-DATA-001"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_jailbreak", "inj_misparam_device"]
      default_params: {}

    - method_id: "llm_hierarchical_allocator"
      name: "LLM hierarchical allocator (assignments -> local controller greedy/EDF/WHCA)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-TOOL-005", "R-CAP-001", "R-DATA-001", "R-COMMS-002"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_msg_poison", "inj_misparam_device"]
      default_params:
        local_strategy: "edf"
        use_whca: false
        whca_horizon: 10

    - method_id: "llm_auction_bidder"
      name: "LLM auction bidder (typed bids -> deterministic auction -> dispatcher)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-DATA-001", "R-COMMS-002", "R-TOOL-006"]
      required_controls: ["signed_actions", "RBAC", "rate_limit", "bid_validation"]
      compatible_injections: ["INJ-COLLUSION-001", "INJ-BID-SPOOF-001", "INJ-COMMS-POISON-001", "INJ-COORD-BID-SHILL-001"]
      default_params: {}

    # Defended variants (composition over base methods; deployable stacks for matrix ranking)
    - method_id: "llm_central_planner_shielded"
      name: "LLM central planner (shielded: strict validation, safe fallback on reject)"
      coordination_class: llm
      base_method: "llm_central_planner"
      defense_profile: "shielded"
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-TOOL-005", "R-CAP-001", "R-DATA-001"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_jailbreak", "inj_misparam_device"]
      default_params: {}

    - method_id: "llm_hierarchical_allocator_shielded"
      name: "LLM hierarchical allocator (shielded)"
      coordination_class: llm
      base_method: "llm_hierarchical_allocator"
      defense_profile: "shielded"
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-COMMS-002", "R-DATA-001"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_msg_poison", "inj_misparam_device"]
      default_params: {}

    - method_id: "llm_auction_bidder_shielded"
      name: "LLM auction bidder (shielded)"
      coordination_class: llm
      base_method: "llm_auction_bidder"
      defense_profile: "shielded"
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-DATA-001", "R-COMMS-002", "R-TOOL-006"]
      required_controls: ["signed_actions", "RBAC", "rate_limit", "bid_validation"]
      compatible_injections: ["INJ-COLLUSION-001", "INJ-BID-SPOOF-001", "INJ-COMMS-POISON-001"]
      default_params: {}

    - method_id: "llm_central_planner_with_safe_fallback"
      name: "LLM central planner (explicit safe fallback on error)"
      coordination_class: llm
      base_method: "llm_central_planner"
      defense_profile: "safe_fallback"
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-CAP-001", "R-DATA-001"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_jailbreak", "inj_misparam_device"]
      default_params: {}

    - method_id: "llm_hierarchical_allocator_with_safe_fallback"
      name: "LLM hierarchical allocator (safe fallback)"
      coordination_class: llm
      base_method: "llm_hierarchical_allocator"
      defense_profile: "safe_fallback"
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-TOOL-001", "R-COMMS-002", "R-DATA-001"]
      required_controls: ["signed_actions", "RBAC", "rate_limit"]
      compatible_injections: ["inj_prompt_injection", "inj_msg_poison", "inj_misparam_device"]
      default_params: {}

    - method_id: "llm_auction_bidder_with_safe_fallback"
      name: "LLM auction bidder (safe fallback)"
      coordination_class: llm
      base_method: "llm_auction_bidder"
      defense_profile: "safe_fallback"
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-DATA-001", "R-COMMS-002", "R-TOOL-006"]
      required_controls: ["signed_actions", "RBAC", "rate_limit", "bid_validation"]
      compatible_injections: ["INJ-COLLUSION-001", "INJ-BID-SPOOF-001", "INJ-COMMS-POISON-001"]
      default_params: {}

    - method_id: "llm_gossip_summarizer"
      name: "LLM gossip summarizer (signed typed messages, deterministic consensus)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-SYS-002"]
      required_controls: ["signed_actions", "RBAC", "message_auth", "replay_protection"]
      compatible_injections: ["INJ-COMMS-POISON-001", "INJ-ID-SPOOF-001", "INJ-CONSENSUS-POISON-001", "INJ-TIMING-QUEUE-001", "INJ-PARTIAL-OBS-001", "INJ-BLAME-SHIFT-001"]
      default_params: {}

    - method_id: "llm_repair_over_kernel_whca"
      name: "LLM repair over kernel WHCA (kernel plan, shield-only execute; LLM repair on block/flag/stale)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-CAP-001", "R-SYS-002"]
      required_controls: ["signed_actions", "message_auth", "shield_execute", "repair_loop"]
      compatible_injections: ["INJ-COMMS-POISON-001", "INJ-ID-SPOOF-001", "INJ-LLM-PROMPT-INJECT-COORD-001", "INJ-COORD-PROMPT-INJECT-001", "INJ-CONSENSUS-POISON-001", "INJ-TIMING-QUEUE-001", "INJ-PARTIAL-OBS-001", "INJ-BLAME-SHIFT-001"]
      default_params:
        kernel_method: "kernel_whca"
        whca_horizon: 15
        max_view_age_ms: 500.0

    - method_id: "llm_local_decider_signed_bus"
      name: "LLM local decider over signed bus (per-agent ActionProposal, deterministic reconciler, shield)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "num_sites", "arrival_rate"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-SYS-002"]
      required_controls: ["signed_actions", "message_auth", "replay_protection"]
      compatible_injections: ["INJ-COMMS-POISON-001", "INJ-ID-SPOOF-001", "INJ-ID-REPLAY-COORD-001", "INJ-COORD-PLAN-REPLAY-001", "INJ-CONSENSUS-POISON-001", "INJ-TIMING-QUEUE-001", "INJ-PARTIAL-OBS-001", "INJ-BLAME-SHIFT-001"]
      default_params: {}

    - method_id: "llm_detector_throttle_advisor"
      name: "LLM detector throttle advisor (wrapper over kernel_auction_whca_shielded; detect + policy-validated containment)"
      coordination_class: llm
      scaling_knobs: ["num_agents", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-SYS-002"]
      required_controls: ["signed_actions", "RBAC", "detector_advisor", "enforcement_policy"]
      compatible_injections: ["INJ-COMMS-POISON-001", "INJ-ID-SPOOF-001"]
      default_params:
        detector_latency_bound_steps: 5

    - method_id: "group_evolving_experience_sharing"
      name: "Group-Evolving experience sharing (deterministic track)"
      coordination_class: decentralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail"]
      default_params:
        share_interval: 5
        summary_max_items: 50

    - method_id: "group_evolving_study"
      name: "Group-Evolving study (population evolution across episodes)"
      coordination_class: decentralized
      scaling_knobs: ["num_agents", "num_sites", "num_devices", "specimen_rate", "episodes_per_generation"]
      known_weaknesses: ["R-COMMS-002", "R-DATA-001", "R-FLOW-002"]
      required_controls: ["signed_actions", "RBAC"]
      compatible_injections: ["inj_tool_selection_noise", "inj_device_fail"]
      default_params:
        share_interval: 5
        summary_max_items: 50
        population_size: 4
        top_k: 2
        episodes_per_generation: 2
