[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "labtrust-gym"
version = "0.1.0"
description = "Multi-agent environment for a self-driving hospital lab (PettingZoo/Gym style) with trust skeleton."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [
    { name = "LabTrust-Gym contributors" }
]
keywords = ["gym", "multi-agent", "hospital-lab", "trust", "policy", "simulation"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering",
]
dependencies = [
    "pyyaml>=6.0",
    "pydantic>=2.0",
    "jsonschema>=4.0",
    "networkx>=3.0",
    "numpy>=1.24",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "ruff>=0.1",
    "mypy>=1.0",
]
# PettingZoo Parallel API wrapper; install with: pip install -e ".[env]"
env = [
    "pettingzoo>=1.24",
    "gymnasium>=0.29",
]
# Plotting pipeline for study outputs; install with: pip install -e ".[plots]"
plots = [
    "matplotlib>=3.7",
]
# PPO/MARL baselines; install with: pip install -e ".[marl]"
marl = [
    "stable-baselines3>=2.0",
    "gymnasium>=0.29",
]
# Documentation site; install with: pip install -e ".[docs]"
docs = [
    "mkdocs>=1.5",
    "mkdocstrings[python]>=0.24",
]

[project.scripts]
labtrust = "labtrust_gym.cli.main:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
target-version = "py311"
line-length = 100
select = ["E", "F", "I", "N", "W", "UP"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_ignores = true

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
