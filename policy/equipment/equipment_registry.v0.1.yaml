equipment_registry:
  version: "0.1"
  units:
    time: "s"
    workload:
      chemistry: "test_equivalents"
      haem: "sample_equivalents"
      coag: "test_equivalents"
  scope:
    partner_anchor:
      org: "HSL / UCLH Blood Sciences"
      notes:
        - "Helix LIMS covers Blood Sciences disciplines including Biochemistry, Immunology, Haematology, Coagulation, Virology."
        - "Model focuses on inside-building lane; reception->preanalytics->analysis->result gating."
  global_scheduling:
    priority_classes: ["ROUTINE", "URGENT", "STAT"]
    queue_policy_default: "PRIORITY_NONPREEMPTIVE"   # cannot interrupt an in-flight batch/run
    stat_insertion:
      enabled: true
      semantics:
        - "STAT may jump ahead of ROUTINE/URGENT in queues."
        - "STAT does not preempt an active device cycle/run; it preempts only the waiting queue."
      max_stat_queue_share: 0.35   # guardrail to avoid starving routine (tunable)
  device_types:

    CENTRIFUGE_BANK:
      kind: "BATCH_SERVER"
      capacity: 60
      batch_model:
        batch_capacity: 60
        min_batch_size: 1
        max_batch_size: 60
        fill_policy: "WAIT_UP_TO_TMAX_OR_FULL"
        tmax_wait_s: 120
      service_time_model:
        setup_s: { dist: "deterministic", value: 60 }
        spin_time_s:
          # canonical centrifugation: ~10 min at ~1300–2000 g (swing-bucket).
          dist: "deterministic"
          value: 600
        teardown_s: { dist: "deterministic", value: 60 }
      timing_model:
        setup_s: { dist: "deterministic", value: 60 }
        run_s: { dist: "deterministic", value: 600 }
        teardown_s: { dist: "deterministic", value: 60 }
      constraints:
        required_preconditions:
          - "specimen.state in ['in_preanalytics','queued_for_preanalytics']"
        outputs:
          - "specimen.state := 'post_centrifuge'"
      failure_model:
        enabled: true
        fault_rate_per_hour: 0.0005
        mttr_s: { dist: "lognormal", mu: 6.5, sigma: 0.4 }  # ~10–20 min typical reset; tunable

    ALIQUOTER:
      kind: "SINGLE_SERVER"
      capacity: 1
      throughput:
        tubes_per_hour: 500
        samples_per_min: 8.33   # 500/60; throughput for cycle-time model
      service_time_model:
        per_tube_overhead_s: { dist: "deterministic", value: 3 }
        per_aliquot_s: { dist: "deterministic", value: 2 }
      timing_model:
        per_tube_overhead_s: { dist: "deterministic", value: 3 }
        per_aliquot_s: { dist: "deterministic", value: 2 }
      constraints:
        required_preconditions:
          - "specimen.state == 'post_centrifuge'"
        outputs:
          - "aliquot.state := 'labeled'"
          - "specimen.state := 'aliquoted'"

    CHEM_ANALYZER:
      kind: "WORKLOAD_LIMITED_SERVER"
      workload_unit: "chemistry.test_equivalents"
      capacity:
        tests_per_hour: 2000
      service_time_model:
        rack_setup_s: { dist: "deterministic", value: 30 }
        per_sample_load_s: { dist: "deterministic", value: 2 }
        per_test_s: { dist: "deterministic", value: 1.8 }
        per_panel_s:
          BIOCHEM_PANEL_CORE: { dist: "deterministic", value: 30 }
      timing_model:
        rack_setup_s: { dist: "deterministic", value: 30 }
        per_sample_load_s: { dist: "deterministic", value: 2 }
        per_test_s: { dist: "deterministic", value: 1.8 }
      qc_model:
        enabled: true
        qc_interval_runs: 50
        schedule:
          kind: "INTERVAL_OR_WORKLOAD"
          interval_s: 28800
          max_patient_tests: 5000
        qc_levels: 2
        westgard_ruleset: "MULTIRULE_DEFAULT"
        outcomes:
          pass_probability: 0.992
          fail_probability: 0.008
        drift_model:
          enabled: true
          hazard_per_test: 1.0e-6
          detection: "next_qc_event"
      outputs:
        - "run.qc_outcome in ['pass','fail']"
        - "results.generated := true"

    HAEM_ANALYZER:
      kind: "PER_SAMPLE_SERVER"
      workload_unit: "haem.sample_equivalents"
      capacity:
        samples_per_hour: 100
      timing_model:
        per_sample_s:
          dist: "deterministic"
          value: 36     # 3600/100
      qc_model:
        enabled: true
        schedule:
          kind: "INTERVAL"
          interval_s: 86400           # at least daily baseline; tunable
        qc_levels: 2
        outcomes:
          pass_probability: 0.995
          fail_probability: 0.005
      outputs:
        - "results.generated := true"

    COAG_ANALYZER:
      kind: "WORKLOAD_LIMITED_SERVER"
      workload_unit: "coag.test_equivalents"
      capacity:
        panel_capacities_tests_per_hour:
          PT_ONLY: 400
          PT_APTT: 400
          PT_APTT_FBG_AT_DD: 270
      service_time_model:
        rack_setup_s: { dist: "deterministic", value: 30 }
        per_sample_load_s: { dist: "deterministic", value: 2 }
        per_panel_s:
          COAG_PANEL_CORE: { dist: "deterministic", value: 45 }
      timing_model:
        rack_setup_s: { dist: "deterministic", value: 30 }
        per_sample_load_s: { dist: "deterministic", value: 2 }
        per_test_s_dynamic:
          PT_ONLY: 9.0
          PT_APTT: 9.0
          PT_APTT_FBG_AT_DD: 13.33
      qc_model:
        enabled: true
        qc_interval_runs: 40
        schedule:
          kind: "INTERVAL_OR_WORKLOAD"
          interval_s: 28800
          max_patient_tests: 3000
        qc_levels: 2
        outcomes:
          pass_probability: 0.99
          fail_probability: 0.01

  device_instances:
    # Pre-analytics
    - device_id: "DEV_CENTRIFUGE_BANK_01"
      device_type: "CENTRIFUGE_BANK"
      zone_id: "centrifuge_bay"
      zone: "centrifuge_bay"
      capacity: 60
      parallel_units: 2
      service_time_model: null   # inherit from type
      batch_model: null
      failure_model: null

    - device_id: "DEV_ALIQUOTER_01"
      device_type: "ALIQUOTER"
      zone_id: "aliquot_label_station"
      zone: "aliquot_label_station"
      capacity: 1
      parallel_units: 1
      service_time_model: null
      batch_model: null
      failure_model: null

    # Analytics (Hall A / Hall B)
    - device_id: "DEV_CHEM_A_01"
      device_type: "CHEM_ANALYZER"
      zone_id: "analyzer_hall_A"
      zone: "analyzer_hall_A"
      capacity: 2000
      parallel_units: 1
      service_time_model: null
      batch_model: null
      failure_model: null

    - device_id: "DEV_CHEM_B_01"
      device_type: "CHEM_ANALYZER"
      zone_id: "analyzer_hall_B"
      zone: "analyzer_hall_B"
      capacity: 2000
      parallel_units: 1
      service_time_model: null
      batch_model: null
      failure_model: null

    - device_id: "DEV_HAEM_01"
      device_type: "HAEM_ANALYZER"
      zone_id: "analyzer_hall_A"
      zone: "analyzer_hall_A"
      capacity: 100
      parallel_units: 1
      service_time_model: null
      batch_model: null
      failure_model: null

    - device_id: "DEV_COAG_01"
      device_type: "COAG_ANALYZER"
      zone_id: "analyzer_hall_B"
      zone: "analyzer_hall_B"
      capacity: 270
      parallel_units: 1
      service_time_model: null
      batch_model: null
      failure_model: null

  panel_workload_map:
    # These are *simulation defaults*; your next step (catalogue schema) will tighten this by test-level constraints.
    BIOCHEM_PANEL_CORE:
      chemistry_test_equivalents: 14
      requires:
        - "centrifuged == true"
        - "container_type in ['SST','PST','SERUM','HEPARIN_PLASMA']"
      analyzer_device_types: ["CHEM_ANALYZER"]

    HAEM_PANEL_CORE:
      haem_sample_equivalents: 1
      requires:
        - "container_type in ['EDTA']"
      analyzer_device_types: ["HAEM_ANALYZER"]

    COAG_PANEL_CORE:
      coag_profile: "PT_APTT_FBG_AT_DD"
      coag_test_equivalents: 5
      requires:
        - "container_type in ['CITRATE']"
      analyzer_device_types: ["COAG_ANALYZER"]

  qc_fail_cascade_semantics:
    # This is the “stop-the-line” effect you benchmark.
    enabled: true
    rules:
      - id: "QC_BLOCK_RELEASE_AFTER_FAIL"
        logic: "if device.qc_state == 'fail' then block RELEASE_RESULT for results linked_to(device, run) until rerun_or_review"
      - id: "QC_RERUN_REQUIRED"
        logic: "if qc_fail affects run_id then create RERUN_REQUEST for all specimens in run_id unless explicitly canceled_by_supervisor"
      - id: "QC_ATTRIBUTION"
        logic: "all blocked results must cite qc_event_id and last_known_good_qc_event_id in the log record"
