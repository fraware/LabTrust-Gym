compiler_contract:
  inputs:
    - policy_pack_yaml
    - events_schema_json
    - entities_schema_json
  outputs:
    - invariant_registry_yaml
    - generated_reason_codes_enum
    - generated_token_requirements_map
  guarantees:
    - "Every invariant has: id, hook, logic_template, severity, on_breach"
    - "Every action referenced in invariants exists in Event Ontology"
    - "Every field referenced in logic_template exists in Entity Schema or resolver library"
