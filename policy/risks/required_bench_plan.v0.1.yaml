# Required-bench plan v0.1: one entry per required_bench cell from method_risk_matrix.
# Evidence: coord_risk = run-benchmark coord_risk with method + injection; executor deduplicates runs.
version: v0.1
description: Maps each required_bench (method_id, risk_id) to one evidence action.
